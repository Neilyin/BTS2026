<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MacBook BTS 優惠計算機</title>
      <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');

    :root {
      --blue:       #0071e3;
      --blue-dark:  #0062c3;
      --green:      #34c759;
      --orange:     #ff9f0a;
      --bg:         #f5f5f7;
      --card-bg:    #ffffff;
      --text:       #1d1d1f;
      --text-sub:   #86868b;
      --border:     rgba(0, 0, 0, 0.08);
      --sel-border: #0071e3;
      --sel-bg:     rgba(0, 113, 227, 0.05);
      --radius-sm:  12px;
      --radius-md:  18px;
      --radius-lg:  26px;
      --shadow-sm:  0 4px 20px rgba(0,0,0,.02);
      --shadow-md:  0 12px 40px rgba(0,0,0,.05);
      --transition: .5s cubic-bezier(0.16, 1, 0.3, 1);
      --safe-top:   env(safe-area-inset-top,0px);
      --safe-bottom:env(safe-area-inset-bottom,0px);

      /* Liquid Glass effect tokens */
      --glass-bg:       rgba(255, 255, 255, 0.65);
      --glass-blur:     blur(20px) saturate(190%);
      --glass-border:   rgba(255, 255, 255, 0.4);
      --glass-shadow:
        0 1px 0 rgba(255, 255, 255, 0.4) inset,
        0 10px 40px rgba(0, 0, 0, 0.02),
        0 1px 3px rgba(0, 0, 0, 0.01);
      --glass-shadow-hover:
        0 1px 0 rgba(255, 255, 255, 0.5) inset,
        0 20px 50px rgba(0, 0, 0, 0.05),
        0 4px 12px rgba(0, 0, 0, 0.02);
    }

    
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { height:100%; font-family:'Inter', -apple-system, BlinkMacSystemFont, 'Noto Sans TC', sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; }

    /* ── Liquid Background Blobs ── */
    .liquid-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
      background: var(--bg);
      transition: background-color 0.5s ease;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.35;
      animation: float 25s infinite alternate ease-in-out;
    }
    .blob-1 {
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, rgba(0, 113, 227, 0.12) 0%, rgba(0, 113, 227, 0) 70%);
      top: -15%;
      left: 10%;
    }
    .blob-2 {
      width: 55vw;
      height: 55vw;
      background: radial-gradient(circle, rgba(94, 92, 230, 0.10) 0%, rgba(94, 92, 230, 0) 70%);
      bottom: -15%;
      right: 10%;
      animation-duration: 30s;
    }
    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -50px) scale(1.05); }
      100% { transform: translate(-15px, 15px) scale(0.95); }
    }

    .app { display:flex; flex-direction:column; min-height:100%; padding-bottom:calc(120px + var(--safe-bottom)); position:relative; z-index:1; }

    /* ── Topbar ── */
    .topbar {
      position:sticky; top:0; z-index:100;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-bottom: 1px solid var(--border);
      padding:calc(12px + var(--safe-top)) 20px 12px;
      display:flex; align-items:center; gap:12px;
      transition: background var(--transition);
    }
    .back-btn { display:inline-flex; align-items:center; gap:4px; color:var(--blue); font-size:15px; font-weight:600; background:none; border:none; cursor:pointer; padding:4px 0; transition: transform var(--transition); }
    .back-btn:hover { transform: translateX(-2px); }
    .back-btn svg { width:10px; height:16px; fill:none; stroke:currentColor; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
    .topbar-title { font-family: 'Outfit', sans-serif; font-size:17px; font-weight:700; flex:1; }
    .designer-chip {
      display:flex;
      align-items:center;
      gap:8px;
      padding:6px 10px 6px 7px;
      border:1px solid rgba(0,113,227,.16);
      border-radius:999px;
      background:rgba(255,255,255,.72);
      box-shadow:0 6px 18px rgba(0,0,0,.05);
      white-space:nowrap;
    }
    .designer-chip-avatar {
      width:24px;
      height:24px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-family:'Outfit', sans-serif;
      font-size:11px;
      font-weight:800;
      background:linear-gradient(135deg,#111827,#0071e3);
    }
    .designer-chip-text {
      display:flex;
      flex-direction:column;
      line-height:1.05;
    }
    .designer-chip-label {
      font-size:8px;
      font-weight:800;
      color:var(--blue);
      text-transform:uppercase;
      letter-spacing:.5px;
    }
    .designer-chip-name {
      font-size:13px;
      font-weight:900;
      color:var(--text);
      letter-spacing:0;
    }
    .receipt-brand {
      margin-top: 12px;
      padding: 13px 14px;
      border: 1px solid rgba(0,113,227,.14);
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(0,113,227,.07), rgba(17,24,39,.035));
      text-align: center;
    }
    .receipt-brand-kicker {
      display:block;
      font-size:10px;
      font-weight:800;
      color:var(--blue);
      text-transform:uppercase;
      letter-spacing:.9px;
      margin-bottom:4px;
    }
    .receipt-brand-name {
      display:block;
      font-family:'Outfit', 'Noto Sans TC', sans-serif;
      font-size:22px;
      font-weight:900;
      color:var(--text);
      letter-spacing:0;
    }
    @media(max-width:520px){
      .topbar { gap:8px; }
      .designer-chip { padding:6px; }
      .designer-chip-text { display:none; }
      .topbar-title { font-size:15px; }
    }
    
    .product-switch { display:flex; background:rgba(0,0,0,0.06); border-radius:8px; padding:2px; gap:2px; }
        .sw-btn { font-size:12px; font-weight:700; padding:4px 14px; border-radius:6px; border:none; background:none; cursor:pointer; color:var(--text-sub); transition:all var(--transition); }
    .sw-btn.active { background:var(--card-bg); color:var(--text); box-shadow:0 2px 6px rgba(0,0,0,.08); }

    /* ── Progress ── */
    .progress-wrap { padding:16px 20px 0; max-width:680px; margin:0 auto; width:100%; }
    .progress-track { height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
    .progress-fill  { height:100%; background:var(--blue); border-radius:2px; transition:width .4s cubic-bezier(.4,0,.2,1); }
    .progress-label { font-size:11px; color:var(--text-sub); margin-top:6px; text-align:right; font-weight:600; }

    /* ── Steps ── */
    .steps-wrap { flex:1; padding:20px 20px 0; max-width:680px; margin:0 auto; width:100%; }
    .step-card {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      border-radius: var(--radius-lg);
      margin-bottom: 12px;
      overflow: hidden;
      transition: all var(--transition);
    }
    .step-card:hover:not(.locked) {
      border-color: rgba(0, 113, 227, 0.15);
      box-shadow: var(--glass-shadow-hover);
    }
    .step-card.locked { opacity:.45; pointer-events:none; }
    .step-header { display:flex; align-items:center; gap:12px; padding:16px 18px; cursor:pointer; }
    .step-num { width:26px; height:26px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; background:rgba(0,0,0,0.03); color:var(--text-sub); border:1.5px solid var(--border); transition:all var(--transition); }
        .step-num.done   { background:var(--green); color:#fff; border-color:var(--green); }
    .step-num.active { background:var(--blue);  color:#fff; border-color:var(--blue);  }
    .step-title { font-size:15.5px; font-weight:700; flex:1; }
    .step-value { font-size:13px; color:var(--text-sub); max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; text-align:right; font-weight:600; }
    .step-body { padding:0 18px 18px; display:none; }
    .step-body.open { display:block; }

    /* ── Option grids ── */
    .opt-grid { display:grid; gap:10px; grid-template-columns:repeat(auto-fill, minmax(140px,1fr)); }
    .opt-grid.cols-2 { grid-template-columns:1fr 1fr; }
    .opt-grid.cols-1 { grid-template-columns:1fr; }
    @media(max-width:360px){ .opt-grid { grid-template-columns:1fr 1fr; } }

    /* ── Option card ── */
    .opt {
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px;
      cursor: pointer;
      text-align: center;
      transition: all var(--transition);
      background: rgba(255,255,255,0.25);
      position: relative;
      overflow: hidden;
    }
        .opt:hover:not(.disabled):not(.selected) {
      border-color: rgba(0, 113, 227, 0.3);
      background: rgba(0, 113, 227, 0.02);
    }
    .opt.selected {
      border-color: var(--sel-border);
      background: var(--sel-bg);
      box-shadow: 0 4px 12px rgba(0, 113, 227, 0.08);
    }
    .opt.selected::after { content:'✓'; position:absolute; top:6px; right:8px; font-size:11px; font-weight:700; color:var(--blue); }
    .opt.disabled { opacity:.4; pointer-events:none; }
    .opt-img { width:100%; max-width:88px; height:64px; object-fit:contain; display:block; margin:0 auto 8px; transition: transform var(--transition); }
    .opt:hover:not(.disabled) .opt-img { transform: scale(1.05); }
    .power-img { width:100%; height:96px; object-fit:contain; display:block; margin:0 auto 10px; transition: transform var(--transition); }
    .opt:hover:not(.disabled) .power-img { transform: scale(1.04); }
    .opt-title { font-size:13px; font-weight:700; margin-bottom:2px; }
    .opt-sub   { font-size:11px; color:var(--text-sub); line-height:1.4; font-weight: 500; }
    .opt-price { font-size:12px; font-weight:700; color:var(--blue); margin-top:4px; }
    .opt-badge { font-size:10px; font-weight:700; color:var(--green); margin-top:2px; }
    .opt-tag   { font-size:10px; background:rgba(0,0,0,0.03); border:1px solid var(--border); border-radius:4px; padding:2px 6px; display:inline-block; margin-top:4px; color:var(--text-sub); font-weight:500; }
    .upgrade-notice {
      border: 1.5px solid rgba(0,113,227,.16);
      border-radius: var(--radius-md);
      background: linear-gradient(135deg, rgba(0,113,227,.06), rgba(255,255,255,.76));
      padding: 16px;
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 14px;
      align-items: center;
    }
    .upgrade-chip-img {
      width: 96px;
      height: 96px;
      border-radius: 18px;
      object-fit: cover;
      background: #050505;
      box-shadow: 0 12px 28px rgba(0,0,0,.16);
    }
    .upgrade-chip-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 20px;
      font-weight: 900;
      line-height: 1.05;
      text-align: center;
    }
    .upgrade-kicker {
      font-size: 11px;
      color: var(--blue);
      font-weight: 800;
      margin-bottom: 4px;
    }
    .upgrade-title {
      font-size: 17px;
      font-weight: 900;
      line-height: 1.25;
      margin-bottom: 6px;
    }
    .upgrade-copy {
      font-size: 12px;
      color: var(--text-sub);
      line-height: 1.55;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .upgrade-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .upgrade-next,
    .upgrade-back {
      min-height: 40px;
      border-radius: 999px;
      border: none;
      padding: 0 16px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }
    .upgrade-next {
      background: var(--blue);
      color: #fff;
    }
    .upgrade-back {
      background: rgba(0,0,0,.06);
      color: var(--text);
    }
    @media(max-width:420px){
      .upgrade-notice { grid-template-columns: 1fr; text-align:center; }
      .upgrade-chip-img { margin:0 auto; }
      .upgrade-actions { justify-content:center; }
    }
    
    /* Color dot */
    .color-dot { width:28px; height:28px; border-radius:50%; margin:0 auto 6px; border:2px solid var(--border); transition:all var(--transition); }
    .opt.selected .color-dot { border-color:var(--blue); transform: scale(1.08); }

    /* Size big card */
    .size-opt {
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 20px 16px;
      cursor: pointer;
      background: rgba(255,255,255,0.25);
      transition: all var(--transition);
      position: relative;
    }
        .size-opt:hover:not(.selected) {
      border-color: rgba(0, 113, 227, 0.3);
      background: rgba(0, 113, 227, 0.02);
    }
    .size-opt.selected {
      border-color: var(--sel-border);
      background: var(--sel-bg);
      box-shadow: 0 4px 12px rgba(0, 113, 227, 0.08);
    }
    .size-opt.selected::after { content:'✓'; position:absolute; top:10px; right:12px; font-size:12px; font-weight:700; color:var(--blue); }
    .size-opt img { width:100%; max-width:120px; height:90px; object-fit:contain; margin-bottom:10px; transition: transform var(--transition); }
    .size-opt:hover img { transform: scale(1.05); }
    .size-opt .sz-label { font-size:16px; font-weight:700; }
    .size-opt .sz-sub   { font-size:12px; color:var(--text-sub); margin-top:2px; font-weight:500; }
    .size-opt .sz-price { font-size:13.5px; font-weight:700; color:var(--blue); margin-top:6px; }

    /* Chip card */
    .chip-opt {
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px;
      cursor: pointer;
      background: rgba(255,255,255,0.25);
      transition: all var(--transition);
      position: relative;
    }
        .chip-opt:hover:not(.selected) {
      border-color: rgba(0, 113, 227, 0.3);
      background: rgba(0, 113, 227, 0.02);
    }
    .chip-opt.selected {
      border-color: var(--sel-border);
      background: var(--sel-bg);
      box-shadow: 0 4px 12px rgba(0, 113, 227, 0.08);
    }
    .chip-opt.selected::after { content:'✓'; position:absolute; top:10px; right:12px; font-size:11px; font-weight:700; color:var(--blue); }
    .chip-name   { font-size:15px; font-weight:700; }
    .chip-detail { font-size:12px; color:var(--text-sub); margin-bottom:4px; font-weight:500; }
    .chip-price  { font-size:13.5px; font-weight:700; color:var(--blue); margin:6px 0 2px; }
    .chip-includes { font-size:11px; color:var(--text-sub); line-height:1.5; font-weight:500; }
    .chip-desc   { font-size:11px; color:var(--text-sub); margin-top:4px; padding-top:4px; border-top:1px solid var(--border); font-weight:500; }

    /* Warning banner */
    .warn-banner { background:rgba(255, 159, 10, 0.1); border:1px solid rgba(255, 159, 10, 0.3); border-radius:var(--radius-sm); padding:10px 12px; font-size:12px; color:var(--orange); margin-bottom:10px; line-height:1.5; font-weight:500; }

    /* Gift rows */
    .gift-section { margin-bottom:16px; }
    .gift-section-title { font-size:12px; font-weight:700; color:var(--text-sub); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
    .gift-opt {
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      cursor: pointer;
      background: rgba(255,255,255,0.25);
      margin-bottom: 8px;
      transition: all var(--transition);
    }
        .gift-opt:hover:not(.selected) {
      border-color: rgba(0, 113, 227, 0.3);
      background: rgba(0, 113, 227, 0.02);
    }
    .gift-opt.selected {
      border-color: var(--blue);
      background: var(--sel-bg);
      box-shadow: 0 4px 12px rgba(0, 113, 227, 0.08);
    }
    .gift-info { flex:1; }
    .gift-name { font-size:13px; font-weight:700; }
    .gift-tag  { font-size:11px; color:var(--green); font-weight:700; margin-top:2px; }
    .gift-tag.paid    { color:var(--blue); }
    .gift-tag.neutral { color:var(--text-sub); }
    .gift-radio { width:20px; height:20px; border-radius:50%; border:2px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:var(--transition); }
    .gift-opt.selected .gift-radio { border-color:var(--blue); background:var(--blue); }
    .gift-opt.selected .gift-radio::after { content:''; width:8px; height:8px; border-radius:50%; background:#fff; }

    /* Rebate */
    .rebate-row { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
    .rebate-label { font-size:14px; font-weight:600; flex:1; }
    .rebate-select { background:rgba(0,0,0,0.03); border:1.5px solid var(--border); border-radius:8px; padding:8px 12px; font-size:14px; font-family:inherit; color:var(--text); outline:none; cursor:pointer; min-width:90px; transition:all var(--transition); font-weight:600; }
        .rebate-select:focus { border-color:var(--blue); box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15); }
    
    .sell-gift-row { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
    .sell-gift-row label { font-size:14px; font-weight:600; flex:1; }
    
    .toggle-switch { position:relative; width:44px; height:26px; cursor:pointer; }
    .toggle-switch input { opacity:0; width:0; height:0; }
    .toggle-track { position:absolute; inset:0; background:var(--border); border-radius:13px; transition:background var(--transition); }
    .toggle-thumb { position:absolute; top:3px; left:3px; width:20px; height:20px; background:#fff; border-radius:50%; box-shadow:0 1px 4px rgba(0,0,0,.2); transition:transform var(--transition); }
    .toggle-switch input:checked + .toggle-track { background:var(--green); }
    .toggle-switch input:checked ~ .toggle-thumb { transform:translateX(18px); }
    
    .gift-price-wrap { display:none; margin-top:8px; }
    .gift-price-wrap.show { display:block; }
    .gift-price-input { width:100%; padding:10px 14px; border:1.5px solid var(--border); border-radius:8px; font-size:14px; font-family:inherit; background:rgba(0,0,0,0.03); outline:none; transition:all var(--transition); font-weight:600; color:var(--text); }
        .gift-price-input:focus { border-color:var(--blue); box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15); }

    /* ── 回饋數字輸入 ── */
    .rebate-input-wrap { display:flex; align-items:center; gap:2px; background:rgba(0,0,0,.03); border:1.5px solid var(--border); border-radius:8px; padding:0 10px; min-width:80px; transition:border-color var(--transition),box-shadow var(--transition); }
        .rebate-input-wrap:focus-within { border-color:var(--blue); box-shadow:0 0 0 3px rgba(0,113,227,.15); }
    .rebate-input { width:52px; padding:8px 0; border:none; background:transparent; font-size:15px; font-weight:600; font-family:inherit; color:var(--text); outline:none; text-align:right; -moz-appearance:textfield; }
    .rebate-input::-webkit-outer-spin-button,.rebate-input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
    .rebate-unit { font-size:14px; color:var(--text-sub); font-weight:500; }
    .rebate-note { font-size:11.5px; color:var(--text-sub); line-height:1.5; margin:-4px 0 12px; padding:8px 10px; background:rgba(255,159,10,.08); border-left:2.5px solid var(--orange); border-radius:0 6px 6px 0; }

    /* ── 贈品用途選擇 ── */
    .sell-gift-section { margin-top:4px; }
    .sell-section-label { font-size:13px; font-weight:600; color:var(--text-sub); margin-bottom:8px; text-transform:uppercase; letter-spacing:.4px; }
    .sell-opts { display:flex; gap:8px; }
    .sell-opt { flex:1; padding:11px 8px; border-radius:12px; font-size:13px; font-weight:600; border:1.5px solid var(--border); background:transparent; color:var(--text-sub); cursor:pointer; transition:var(--transition); text-align:center; }
    .sell-opt:active { transform:scale(.97); }
    .sell-opt.active { border-color:var(--blue); background:rgba(0,113,227,.08); color:var(--blue); }
        .rebate-cta-btn {
      margin-top:20px; width:100%; padding:15px; border-radius:14px;
      background:var(--blue); color:#fff; border:none; cursor:pointer;
      font-size:15px; font-weight:700; font-family:inherit;
      display:flex; align-items:center; justify-content:center; gap:8px;
      box-shadow:0 4px 16px rgba(0,113,227,.3);
      transition:all var(--transition);
    }
    .rebate-cta-btn:hover  { background:var(--blue-dark); box-shadow:0 6px 20px rgba(0,113,227,.4); }
    .rebate-cta-btn:active { transform:scale(.97); }

    /* Price bar */
    .price-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-top: 1px solid var(--border);
      padding: 14px 20px calc(14px + var(--safe-bottom));
      z-index: 90;
      box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.02);
      transition: background var(--transition);
    }
    .price-bar-inner { max-width:680px; margin:0 auto; display:flex; align-items:center; gap:14px; }
    .price-nums { flex:1; }
    .price-final { font-family: 'Outfit', sans-serif; font-size:22px; font-weight:800; line-height:1.2; }
    .price-breakdown { font-size:12px; color:var(--text-sub); margin-top:2px; line-height:1.5; font-weight:500; }
    .price-saved { font-size:12px; font-weight:700; color:var(--green); }
    
    .gen-btn {
      background:var(--blue);
      color:#fff;
      font-size:14px;
      font-weight:700;
      padding:12px 22px;
      border-radius:22px;
      border:none;
      cursor:pointer;
      white-space:nowrap;
      transition:all var(--transition);
      display:flex;
      align-items:center;
      gap:6px;
      box-shadow: 0 4px 12px rgba(0, 113, 227, 0.2);
    }
    .gen-btn:active { transform:scale(.97); }
    .gen-btn:disabled { background:var(--border); color:var(--text-sub); cursor:not-allowed; box-shadow:none; }
    .gen-btn.ready { background:var(--green); box-shadow: 0 4px 12px rgba(52, 199, 89, 0.2); }
    .gen-btn svg { width:16px; height:16px; fill:none; stroke:currentColor; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }

    /* Modal */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:200; display:none; align-items:flex-end; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
    .modal-overlay.open { display:flex; animation:fadeIn .25s ease; }
    @keyframes fadeIn { from{opacity:0} }
    .modal-sheet {
      background: var(--card-bg);
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-height: 92vh;
      overflow-y: auto;
      padding: 24px 20px calc(24px + var(--safe-bottom));
      animation: slideUp .4s cubic-bezier(0.16, 1, 0.3, 1);
      border-top: 1px solid var(--border);
      box-shadow: var(--shadow-md);
    }
    @keyframes slideUp { from{transform:translateY(100%)} }
    .modal-handle { width:40px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 20px; }
    .modal-title { font-family: 'Outfit', sans-serif; font-size:20px; font-weight:800; margin-bottom:20px; text-align:center; }
    .receipt-item { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--border); }
    .receipt-item:last-child { border-bottom:none; }
    .receipt-label { font-size:14px; color:var(--text-sub); font-weight:500; }
    .receipt-value { font-size:14px; font-weight:600; }
    .receipt-value.free   { color:var(--green); font-weight:700; }
    .receipt-value.deduct { color:var(--blue); }
    .receipt-divider { border:none; border-top:1.5px solid var(--border); margin:12px 0; }
    .receipt-total { display:flex; justify-content:space-between; align-items:center; padding:14px 0; }
    .receipt-total-label { font-size:17px; font-weight:800; }
    .receipt-total-value { font-family: 'Outfit', sans-serif; font-size:22px; font-weight:800; color:var(--blue); }
    
    .receipt-saved-row { background:rgba(52, 199, 89, 0.1); border: 1px solid rgba(52, 199, 89, 0.2); border-radius:10px; padding:10px 14px; display:flex; align-items:center; gap:8px; margin:8px 0 20px; justify-content: center; }
    .receipt-saved-row span { font-size:13px; font-weight:700; color:#1a7a3b; }
        
    .modal-actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px; }
    .modal-btn { padding:13px; border-radius:14px; font-size:14px; font-weight:700; border:none; cursor:pointer; transition:all var(--transition); display:flex; align-items:center; justify-content:center; gap:6px; }
    .modal-btn:active { transform: scale(0.97); }
    .modal-btn.primary   { background:var(--blue); color:#fff; box-shadow:0 4px 12px rgba(0, 113, 227, 0.2); }
    .modal-btn.primary:hover { background:var(--blue-dark); box-shadow:0 6px 16px rgba(0, 113, 227, 0.35); }
    .modal-btn.secondary { background:rgba(0,0,0,0.03); color:var(--text); border:1.5px solid var(--border); }
        
    .purchase-links { margin-top:16px; }
    .purchase-links-title { font-size:13px; font-weight:700; color:var(--text-sub); margin-bottom:10px; }
    .purchase-link-btn { display:flex; align-items:center; gap:10px; padding:12px 14px; border-radius:12px; text-decoration:none; font-size:14px; font-weight:700; margin-bottom:8px; transition:all var(--transition); }
    .purchase-link-btn:active { transform: scale(0.97); }
    .purchase-link-btn.line    { background:#06c755; color:#fff; box-shadow:0 4px 12px rgba(6, 199, 85, 0.2); }
    .purchase-link-btn.official { background:var(--text); color:var(--bg); }

    /* Toast */
    .toast { position:fixed; bottom:calc(100px + var(--safe-bottom)); left:50%; transform:translateX(-50%) translateY(20px); background:rgba(0,0,0,.85); color:#fff; font-size:13px; font-weight:600; padding:10px 20px; border-radius:20px; z-index:300; opacity:0; transition:all var(--transition); white-space:nowrap; pointer-events:none; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* Price preview card */
    .price-preview-inline { background:var(--sel-bg); border:1.5px solid rgba(0, 113, 227, 0.15); border-radius:var(--radius-sm); padding:10px 14px; margin-bottom:12px; display:flex; align-items:center; gap:8px; }

    @media(min-width:540px){ .opt-grid { grid-template-columns:repeat(3,1fr); } .opt-grid.cols-2 { grid-template-columns:1fr 1fr; } }
    @media(min-width:680px){ .steps-wrap,.progress-wrap { padding-left:32px; padding-right:32px; } .topbar { padding-left:32px; padding-right:32px; } }

<script>
// ═══════════════════════════════════════
//  State
// ═══════════════════════════════════════
let productType = 'air';   // 'air' | 'pro' | 'imac'

const state = {
  size:       null,   // '13'|'15' (Air) / '14'|'16' (Pro)
  color:      null,
  // Air specific
  chipId:     null,   // 'M5_8gpu' | 'M5_10gpu'
  memId:      null,   // '16gb'|'24gb'|'32gb'
  storageId:  null,
  powerId:    null,
  // Pro specific
  chipFamily: null,
  chipObj:    null,   // full chip object from config
  proMemAdj:  0,      // price adjustment for RAM upgrade
  proMemId:   null,
  proStorAdj: 0,
  proStorId:  null,
  nano:       null,
  // iMac specific
  imacChipId: null,
  standId: null,
  ethernetId: null,
  pointingId: null,
  keyboardId: null,
  // Shared
  gift:         null,  // { id, price, originalPrice, name }
  creditCard:   0,
  referral:     0,
  sellGift:     false,
  giftPrice:    0
};

function getDefaultReferralRate() {
  const campaigns = Object.values(BTS_CONFIG.meta.referralCampaigns || {});
  const today = new Date().toISOString().slice(0, 10);
  return campaigns.reduce((max, campaign) => {
    const active = campaign.enabled !== false
      && (!campaign.startDate || today >= campaign.startDate)
      && (!campaign.endDate || today <= campaign.endDate);
    return active ? Math.max(max, Number(campaign.rate) || 0) : max;
  }, 0);
}

// ═══════════════════════════════════════
//  Init
// ═══════════════════════════════════════
function init() {
  const p = new URLSearchParams(window.location.search).get('product');
  productType = ['pro', 'imac', 'neo', 'macmini'].includes(p) ? p : 'air';
  reset();
  renderAll();
}

function reset() {
  Object.assign(state, {
    size:null, color:null,
    chipId:null, memId:null, storageId:null, powerId:null,
    chipFamily:null, chipObj:null, proMemAdj:0, proMemId:null, proStorAdj:0, proStorId:null,
    nano:null, imacChipId:null, standId:null, ethernetId:null, pointingId:null, keyboardId:null, gift:null,
    creditCard:0, referral:getDefaultReferralRate(), sellGift:false, giftPrice:0
  });
}

function switchProduct(t) {
  if (productType === t) return;
  productType = t;
  reset();
  renderAll();
}

function renderAll() {
  document.getElementById('topbar-title').textContent = getProductTitle();
  renderSteps();
  updatePrice();
}

function getProductTitle() {
  if (productType === 'air') return 'MacBook Air 計算機';
  if (productType === 'pro') return 'MacBook Pro 計算機';
  if (productType === 'imac') return 'iMac 計算機';
  if (productType === 'neo') return 'MacBook Neo 計算機';
  if (productType === 'macmini') return 'Mac mini 計算機';
  return 'Mac 計算機';
}

function isSimpleMac() {
  return productType === 'neo' || productType === 'macmini';
}

function getSimpleMacConfig() {
  return productType === 'neo' ? BTS_CONFIG.products.macbookNeo : BTS_CONFIG.products.macMini;
}

function getSelectedSimpleChip() {
  const cfg = getSimpleMacConfig();
  return (cfg.chips || []).find(c => c.id === state.chipId) || null;
}

function getSimpleOptionGroup(group) {
  const cfg = getSimpleMacConfig();
  const chip = getSelectedSimpleChip();
  return chip?.[group] || cfg[group] || [];
}

// ═══════════════════════════════════════
//  Step definitions
// ═══════════════════════════════════════
function getStepDefs() {
  if (productType === 'neo') return [
    { id:'color',   title:'選擇顏色',   icon:'' },
    { id:'storage', title:'儲存裝置',   icon:'' },
    { id:'rebate',  title:'回饋試算',   icon:'' }
  ];
  if (productType === 'macmini') return [
    { id:'color',    title:'選擇顏色',   icon:'' },
    { id:'chip',     title:'選擇晶片',   icon:'' },
    { id:'memory',   title:'統一記憶體', icon:'' },
    { id:'storage',  title:'儲存裝置',   icon:'' },
    { id:'ethernet', title:'網路連接',   icon:'' },
    { id:'rebate',   title:'回饋試算',   icon:'' }
  ];
  if (productType === 'air') return [
    { id:'size',         title:'選擇尺寸',     icon:'' },
    { id:'color',        title:'選擇顏色',     icon:'' },
    { id:'chip',         title:'選擇晶片',     icon:'' },
    { id:'memory',       title:'統一記憶體',   icon:'' },
    { id:'storage',      title:'儲存裝置',     icon:'' },
    { id:'power',        title:'電源轉接器',   icon:'' },
    { id:'rebate',       title:'回饋試算',     icon:'' }
  ];
  if (productType === 'imac') return [
    { id:'color',    title:'選擇顏色',     icon:'' },
    { id:'chip',     title:'選擇晶片',     icon:'' },
    { id:'memory',   title:'統一記憶體',   icon:'' },
    { id:'storage',  title:'儲存裝置',     icon:'' },
    ...(shouldShowImacDisplay() ? [{ id:'display', title:'顯示器', icon:'' }] : []),
    { id:'stand',    title:'底座',         icon:'' },
    { id:'ethernet', title:'網路連接',     icon:'' },
    { id:'pointing', title:'滑鼠/觸控板',  icon:'' },
    { id:'keyboard', title:'鍵盤',         icon:'' },
    { id:'rebate',   title:'回饋試算',     icon:'' }
  ];
  return [
    { id:'size',    title:'選擇尺寸',   icon:'' },
    { id:'color',   title:'選擇顏色',   icon:'' },
    { id:'display', title:'顯示器',     icon:'' },
    { id:'chip',    title:'選擇晶片',   icon:'' },
    { id:'compute', title:'處理能力',   icon:'' },
    { id:'memory',  title:'統一記憶體', icon:'' },
    { id:'storage', title:'儲存裝置',   icon:'' },
    ...(shouldShowProPowerStep() ? [{ id:'power', title:'電源轉接器', icon:'' }] : []),
    { id:'rebate',  title:'回饋試算',   icon:'' }
  ];
}

function renderSteps() {
  const defs = getStepDefs();
  document.getElementById('steps-wrap').innerHTML =
    defs.map((s,i) => `
    <div class="step-card locked" id="sc-${s.id}">
      <div class="step-header" onclick="toggleStep('${s.id}')">
        <div class="step-num" id="sn-${s.id}">${i+1}</div>
        <span class="step-title">${s.icon} ${s.title}</span>
        <span class="step-value" id="sv-${s.id}"></span>
      </div>
      <div class="step-body" id="sb-${s.id}"></div>
    </div>`).join('');
  openStep(0);
  updateProgress();
}

// ═══════════════════════════════════════
//  Step open/close
// ═══════════════════════════════════════
function openStep(idx) {
  const defs = getStepDefs();
  defs.forEach((s, i) => {
    const card = document.getElementById(`sc-${s.id}`);
    const body = document.getElementById(`sb-${s.id}`);
    const num  = document.getElementById(`sn-${s.id}`);
    if (!card) return;
    if (i < idx) {
      card.classList.remove('locked');
      body.classList.remove('open');
      num.className = 'step-num done';
      num.textContent = '✓';
    } else if (i === idx) {
      card.classList.remove('locked');
      body.classList.add('open');
      num.className = 'step-num active';
      num.textContent = i + 1;
      body.innerHTML = buildStepBody(s.id);
      restoreSelections(s.id);
      setTimeout(() => card.scrollIntoView({ behavior:'smooth', block:'nearest' }), 100);
    } else {
      card.classList.add('locked');
      body.classList.remove('open');
      num.className = 'step-num';
      num.textContent = i + 1;
    }
  });
}

function toggleStep(id) {
  const defs = getStepDefs();
  const idx  = defs.findIndex(s => s.id === id);
  const card = document.getElementById(`sc-${id}`);
  if (card.classList.contains('locked')) return;
  const body = document.getElementById(`sb-${id}`);
  if (!body.classList.contains('open')) openStep(idx);
}

function advanceTo(id) {
  const defs = getStepDefs();
  const idx  = defs.findIndex(s => s.id === id);
  openStep(idx);
  updateProgress();
}

function updateProgress() {
  const defs = getStepDefs();
  const done = defs.filter(s => stepDone(s.id)).length;
  const pct  = Math.round((done / defs.length) * 100);
  document.getElementById('progress-fill').style.width  = pct + '%';
  document.getElementById('progress-label').textContent = `步驟 ${done} / ${defs.length}`;
}

function stepDone(id) {
  switch(id) {
    case 'size':    return !!state.size;
    case 'color':   return !!state.color;
    case 'chip':    return productType==='air' ? !!state.chipId : productType==='imac' ? !!state.imacChipId : productType==='macmini' ? !!state.chipId : productType==='neo' ? true : !!state.chipFamily;
    case 'compute': return productType==='pro' ? !!state.chipObj : true;
    case 'memory':  return productType==='air' || productType==='imac' || isSimpleMac() ? !!state.memId : state.proMemId !== null;
    case 'storage': return productType==='air' || productType==='imac' || isSimpleMac() ? !!state.storageId : state.proStorId !== null;
    case 'power':   return productType==='imac' ? true : !!state.powerId;
    case 'display': return state.nano !== null;
    case 'stand':   return !!state.standId;
    case 'ethernet': return !!state.ethernetId;
    case 'pointing': return !!state.pointingId;
    case 'keyboard': return !!state.keyboardId;
    case 'gifts':   return !!state.gift;
    case 'rebate':  return true;
    default: return false;
  }
}

  if (isSimpleMac()) return buildSimpleMacStep(id);

}

function isProMemoryUpgradeOption(item) {
  return productType === 'pro'
    && !!item?.upgradeToChip
    && item.upgradeToChip !== state.chipObj?.id;
}

function shouldShowProPowerStep() {
  if (productType !== 'pro') return false;
  return state.chipObj?.requiresPowerSelection !== false;
}

function proShowMemoryUpgradeNotice(memId) {
  const body = document.getElementById('sb-memory');
  if (!body || !state.chipObj) return;
  const item = state.chipObj.memory.find(m => m.id === memId);
  const target = BTS_CONFIG.products.macbookPro.sizes[state.size].chips.find(c => c.id === item?.upgradeToChip);
  if (!item || !target) return;
  const targetMem = target.memory.find(m => m.id === memId);
  const chipDiff = target.basePrice - state.chipObj.basePrice;
  body.innerHTML = `<div class="upgrade-notice">
    <div class="upgrade-chip-img upgrade-chip-badge">M5<br>${target.name.replace('M5 ', '')}</div>
    <div>
      <div class="upgrade-kicker">需要更高階晶片</div>
      <div class="upgrade-title">${item.name} 會改用 ${target.detail} 版本</div>
      <div class="upgrade-copy">
        接下來會切換到 ${target.name} ${target.detail} 的價格，晶片價差為 NT$${chipDiff.toLocaleString()}，${item.name} 記憶體加購為 NT$${(targetMem?.priceAdj || 0).toLocaleString()}。按下一步後會自動重新計算。
      </div>
      <div class="upgrade-actions">
        <button class="upgrade-next" onclick="proUpgradeChipAndSelectMemory('${target.id}','${item.id}')">下一步</button>
        <button class="upgrade-back" onclick="openStep(getStepDefs().findIndex(s => s.id === 'memory'))">返回選項</button>
      </div>

function proUpgradeChipAndSelectMemory(chipId, memId) {
  const chip = BTS_CONFIG.products.macbookPro.sizes[state.size].chips.find(c => c.id === chipId);
  if (!chip) return;
  const mem = chip.memory.find(m => m.id === memId);
  state.chipFamily = chip.processor || chip.id;
  state.chipObj = chip;
  state.proMemId = memId;
  state.proMemAdj = mem?.priceAdj || 0;
  state.proStorId = chip.defaultStorage;
  state.proStorAdj = 0;
  state.powerId = chip.defaultPower;
  renderSteps();
  setSV('chip', chip.name);
  setSV('compute', chip.detail);
  setSV('memory', memId.toUpperCase().replace('GB',' GB'));
  setSV('storage', chip.defaultStorage.toUpperCase().replace('TB',' TB').replace('GB',' GB'));
  setSV('power', chip.power.find(p => p.id === state.powerId)?.name || '');
  showToast(`已改為 ${chip.detail} 並選擇 ${mem?.name || memId}`);
  advanceTo('storage');
  updatePrice();
}

function getProChipFamilies() {
  const chips = BTS_CONFIG.products.macbookPro.sizes[state.size].chips;
  const familyInfo = {
    m5: {
      name: 'M5 晶片',
      desc: '適合日常的個人、專業和創意任務。'
    },
    m5pro: {
      name: 'M5 Pro 晶片',
      desc: '提供更強悍效能和更高記憶體選項，可駕馭更繁重工作流程。'
    },
    m5max: {
      name: 'M5 Max 晶片',
      desc: '為專業級筆電打造，適合最繁重的影片、3D 與 AI 工作流程。'
    }
  };
  return Object.values(chips.reduce((acc, chip) => {
    const key = chip.processor || chip.id;
    if (!acc[key]) {
      const sameFamily = chips.filter(c => (c.processor || c.id) === key);
      const minPrice = Math.min(...sameFamily.map(c => c.basePrice));
      acc[key] = {
        processor: key,
        name: familyInfo[key]?.name || chip.name,
        desc: familyInfo[key]?.desc || chip.desc,
        basePrice: minPrice,
        summary: sameFamily.length === 1 ? chip.detail : `${sameFamily.length} 個處理能力選項`
      };
    }
    return acc;
  }, {}));
}

/* ── iMac steps ── */
function buildImacStep(id) {
  const cfg = BTS_CONFIG.products.imac;
  const chip = cfg.chips.find(c => c.id === state.imacChipId);
  switch(id) {
    case 'color': {
      const colorMap = { '藍色':'#6bb6df','紫色':'#b7a4d8','粉紅色':'#f3a7b7','橙色':'#f6a35f','黃色':'#f3d45c','綠色':'#9ccf9a','銀色':'#e5e5ea' };
      return `<div class="opt-grid">
        ${cfg.colors.map(c=>`
        <div class="opt" id="color-${esc(c)}" onclick="imacSelectColor('${c}')">
          <img class="opt-img" src="${cfg.colorImages['24']?.[c] || ''}" alt="iMac ${c}" onerror="this.style.display='none'">
          <div class="color-dot" style="background:${colorMap[c]||'#ccc'}"></div>
          <div class="opt-title">${c}</div>
        </div>`).join('')}
      </div>`;
    }
    case 'chip': {
      if (!state.color) return warn('請先選擇顏色');
      const chips = cfg.chips.filter(c => !c.availableColors || c.availableColors.includes(state.color));
      return chips.map(c=>`
      <div class="chip-opt" id="chip-${c.id}" onclick="imacSelectChip('${c.id}')">
        <div class="chip-name">${c.name} 晶片${c.thunderbolt ? `具備${c.thunderbolt}` : ''}</div>
        <div class="chip-detail">${c.detail}</div>
        <div class="chip-price">NT$${c.basePrice.toLocaleString()}</div>
        <div class="chip-desc">${c.desc}</div>
      </div>`).join('');
    }
    case 'memory': {
      if (!state.imacChipId) return warn('請先選擇晶片');
      return `${imacPricePreview()}<div class="opt-grid">
        ${cfg.memory.map(m=>{
          const enabled = isImacOptionAvailable(m);
          const upgrade = isImacUpgradeOption(m);
          const price = getImacOptionPrice(m);
          return `
        <div class="opt ${enabled || upgrade ? '' : 'disabled'}" id="mem-${m.id}" ${enabled ? `onclick="imacSelectMemory('${m.id}')"` : upgrade ? `onclick="imacShowUpgradeNotice('memory','${m.id}')"` : ''}>
          <div class="opt-title">${m.name}</div>
          ${enabled ? (price>0 ? `<div class="opt-price">+NT$${price.toLocaleString()}</div>` : `<div class="opt-badge">已配備</div>`) : `<div class="opt-tag">${m.unavailableText || '此機型不可選'}</div>`}
        </div>`}).join('')}
      </div>`;
    }
    case 'storage': {
      if (!state.memId) return warn('請先選擇記憶體');
      return `${imacPricePreview()}<div class="opt-grid">
        ${cfg.storage.map(s=>{
          const enabled = isImacOptionAvailable(s);
          const upgrade = isImacUpgradeOption(s);
          const price = getImacOptionPrice(s);
          return `
        <div class="opt ${enabled || upgrade ? '' : 'disabled'}" id="stor-${s.id}" ${enabled ? `onclick="imacSelectStorage('${s.id}')"` : upgrade ? `onclick="imacShowUpgradeNotice('storage','${s.id}')"` : ''}>
          <div class="opt-title">${s.name}</div>
          ${enabled ? (price>0 ? `<div class="opt-price">+NT$${price.toLocaleString()}</div>` : `<div class="opt-badge">已配備</div>`) : `<div class="opt-tag">${s.unavailableText || '此機型不可選'}</div>`}
        </div>`}).join('')}
      </div>`;
    }
    case 'display': {
      if (!state.storageId) return warn('請先選擇儲存裝置');
      const canNano = !!chip?.supportsNano;
      return `${imacPricePreview()}<div class="opt-grid cols-2">
        <div class="opt" id="disp-no" onclick="imacSelectDisplay(false)">
          <div class="opt-title">標準玻璃</div>
          <div class="opt-badge">不加價</div>
        </div>
        <div class="opt ${canNano ? '' : 'disabled'}" id="disp-yes" ${canNano ? 'onclick="imacSelectDisplay(true)"' : ''}>
          <div class="opt-title">奈米紋理玻璃</div>
          <div class="opt-sub">${canNano ? '減少眩光與反射' : '僅四個 Thunderbolt 埠機型提供'}</div>
          <div class="opt-price">+NT$${cfg.nanoPrice.toLocaleString()}</div>
        </div>
      </div>`;
    }
    case 'stand': return buildImacOptionStep(cfg.stand, 'stand', 'imacSelectStand');
    case 'ethernet': return buildImacOptionStep(cfg.ethernet, 'eth', 'imacSelectEthernet');
    case 'pointing': return buildImacOptionStep(cfg.pointing, 'point', 'imacSelectPointing');
    case 'keyboard': return buildImacOptionStep(cfg.keyboard, 'kbd', 'imacSelectKeyboard');
    case 'gifts': return buildGiftsStep();
    case 'rebate': return buildRebateStep();
    default: return '';
  }
}

function buildImacOptionStep(items, prefix, fn) {
  const visibleItems = items.filter(isImacOptionAvailable);
  return `${imacPricePreview()}<div class="opt-grid">
    ${visibleItems.map(item=>{
      const price = getImacOptionPrice(item);
      const defaultLabel = isImacOptionDefault(item) ? '已配備' : '已包含';
      return `
    <div class="opt" id="${prefix}-${item.id}" onclick="${fn}('${item.id}')">
      <div class="opt-title">${item.name}</div>
      ${item.desc ? `<div class="opt-sub">${item.desc}</div>` : ''}
      ${price>0 ? `<div class="opt-price">+NT$${price.toLocaleString()}</div>` : `<div class="opt-badge">${defaultLabel}</div>`}
    </div>`}).join('')}
  </div>`;
}

function getImacOptionPrice(item) {
  return getImacOptionPriceForChip(item, state.imacChipId);
}

function getImacOptionPriceForChip(item, chipId) {
  if (!item) return 0;
  if (chipId && item.priceByChip && item.priceByChip[chipId] !== undefined) {
    return Number(item.priceByChip[chipId]) || 0;
  }
  return Number(item.priceAdj) || 0;
}

function isImacOptionAvailable(item) {
  return !Array.isArray(item.availableChips) || item.availableChips.includes(state.imacChipId);
}

function isImacUpgradeOption(item) {
  return state.imacChipId === 'M4_8_8'
    && Array.isArray(item?.availableChips)
    && item.availableChips.includes('M4_10_10');
}

function isImacOptionDefault(item) {
  if (!item || !isImacOptionAvailable(item)) return false;
  return !!item.isDefault || (Array.isArray(item.isDefaultChips) && item.isDefaultChips.includes(state.imacChipId));
}

function getDefaultImacOptionId(items) {
  return items.find(isImacOptionDefault)?.id || items.find(isImacOptionAvailable)?.id || null;
}

function shouldShowImacDisplay() {
  if (productType !== 'imac') return false;
  if (!state.imacChipId) return true;
  const chip = BTS_CONFIG.products.imac.chips.find(c => c.id === state.imacChipId);
  return !!chip?.supportsNano;
}

function imacPricePreview() {
  const total = getMacBasePrice();
  if (!total) return '';
  return `<div class="price-preview-inline">
    <span class="ppi-label">目前規格小計</span>
    <span class="ppi-val">NT$${total.toLocaleString()}</span>
  </div>`;
}

function isAirOptionAvailable(item) {
  return !Array.isArray(item.availableChips) || item.availableChips.includes(state.chipId);
}

function isAirUpgradeOption(item) {
  return productType === 'air'
    && state.size === '13'
    && state.chipId === 'M5_8gpu'
    && Array.isArray(item?.availableChips)
    && item.availableChips.includes('M5_10gpu');
}

function getAirHiddenUpgradeDiscount() {
  if (productType !== 'air' || state.size !== '13' || state.chipId !== 'M5_10gpu') return 0;
  const cfg = BTS_CONFIG.products.macbookAir.sizes[state.size];
  const memAdj = cfg.memory.find(m => m.id === state.memId)?.priceAdj || 0;
  const storAdj = cfg.storage.find(s => s.id === state.storageId)?.priceAdj || 0;
  const discounts = [];
  if (memAdj > 0) discounts.push(3150);
  if (storAdj > 0) discounts.push(3150);
  return discounts.length ? Math.max(...discounts) : 0;
}

function airShowUpgradeNotice(kind, id) {

  if (!body) return;

function buildAirUpgradeNotice(kind, id) {

        接下來會切換到 10 核心 CPU、10 核心 GPU 的 M5 價格，起價為 NT$42,740。${stepLabel}「${item.name}」會使用此晶片版本的計價方式，你可以在接受更改前檢視新的配置。
      </div>

function airUpgradeAndSelect(kind, id) {
  const cfg = BTS_CONFIG.products.macbookAir.sizes[state.size];
  state.chipId = 'M5_10gpu';
  state.powerId = null;
  if (kind === 'memory') {
    state.memId = id;
    if (!cfg.storage.some(s => s.id === state.storageId && isAirOptionAvailable(s))) {
      state.storageId = '512gb';
    }
  }
  if (kind === 'storage') {
    state.storageId = id;
    if (!cfg.memory.some(m => m.id === state.memId && isAirOptionAvailable(m))) {
      state.memId = '16gb';
    }
  }
  renderSteps();
  setSV('size', cfg.label);
  setSV('color', state.color || '');
  setSV('chip', cfg.chips.find(c => c.id === state.chipId)?.detail || '');
  if (state.memId) setSV('memory', cfg.memory.find(m => m.id === state.memId)?.name || '');
  if (state.storageId) setSV('storage', cfg.storage.find(s => s.id === state.storageId)?.name || '');
  showToast('已改為 M5 10 核心 GPU 版本');
  advanceTo(kind === 'memory' ? 'storage' : 'power');
  updatePrice();
}

/* ── Shared: Gifts + Rebate ── */
function buildMacGiftList() {
  const giftLine = productType === 'imac' ? 'imac' : 'macbook';
  const giftSize = productType === 'imac' ? '24' : state.size;
  const combos = getMatchingGiftCombos(giftLine, productType, giftSize);
  if (combos.length) {
    return [
      ...combos,
      { id: 'none', name: '不加購配件', btsPrice: 0, originalPrice: 0, tag: '略過此步驟' }
    ];
  }

  const g = BTS_CONFIG.btsGifts;
  const list = [];
  g.macbookProductivity.forEach(x => {
    list.push({ id: 'prod_' + x.id, name: x.name, btsPrice: x.btsPrice ?? 0, originalPrice: x.originalPrice, tag: x.tag });
  });
  g.macbookAirpods.filter(x => x.id !== 'none').forEach(x => {
    list.push({ id: 'ap_' + x.id, name: x.name, btsPrice: x.btsPrice ?? 0, originalPrice: x.originalPrice, tag: x.tag });
  });
  list.push({ id: 'none', name: '不加購配件', btsPrice: 0, originalPrice: 0, tag: '略過此步驟' });
  return list;
}

function getMatchingGiftCombos(productLine, product, size) {
  const combos = Array.isArray(BTS_CONFIG.btsGiftCombos) ? BTS_CONFIG.btsGiftCombos : [];
  return combos
    .filter(combo => combo && combo.active !== false)
    .filter(combo => combo.productLine === 'all' || combo.productLine === productLine)
    .filter(combo => combo.product === 'all' || combo.product === product)
    .filter(combo => !Array.isArray(combo.sizes) || combo.sizes.length === 0 || combo.sizes.includes(String(size)))
    .sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0))
    .map(combo => ({
      id: combo.id || `combo_${combo.name}`,
      name: combo.name,
      btsPrice: getComboTotal(combo, 'btsPrice'),
      originalPrice: getComboTotal(combo, 'originalPrice'),
      tag: combo.tag || buildComboTag(combo),
      items: combo.items || []
    }));
}

function getComboTotal(combo, field) {
  if (Array.isArray(combo.items)) {
    return combo.items.reduce((sum, item) => sum + (Number(item[field]) || 0), 0);
  }
  return Number(combo[field]) || 0;
}

function buildComboTag(combo) {
  const names = Array.isArray(combo.items) ? combo.items.map(item => item.name).filter(Boolean) : [];
  return names.length ? names.join(' + ') : '';
}

function buildGiftsStep() {
  return buildMacGiftList().map(g => {
    const isSelected = state.gift?.id === g.id;
    const tagClass = g.id === 'none' ? 'neutral' : g.btsPrice > 0 ? 'paid' : '';
    return `<div class="gift-opt${isSelected ? ' selected' : ''}" id="gift-item-${g.id}"
      onclick='selectGift(${JSON.stringify(g.id)}, ${g.btsPrice}, ${g.originalPrice}, ${JSON.stringify(g.name)})'>
      <div class="gift-info">
        <div class="gift-name">${g.name}</div>
        <div class="gift-tag ${tagClass}">${g.tag}</div>
      </div>
      <div class="gift-radio"></div>
    </div>`;
  }).join('');
}

function restoreSelections(id) {
  if (id === 'size'   && state.size)   hlOpt(`size-${state.size}`);
  if (id === 'color'  && state.color)  hlOpt(`color-${esc(state.color)}`);
  if (id === 'chip') {
    if (productType==='air' && state.chipId)  hlOpt(`chip-${state.chipId}`);
    if (productType==='imac' && state.imacChipId) hlOpt(`chip-${state.imacChipId}`);
    if (productType==='macmini' && state.chipId) hlOpt(`chip-${state.chipId}`);
    if (productType==='pro' && state.chipFamily) hlOpt(`chip-${state.chipFamily}`);
  }
  if (id === 'compute' && state.chipObj) hlOpt(`compute-${state.chipObj.id}`);
  if (id === 'memory') {
    if (productType==='air' && state.memId)  hlOpt(`mem-${state.memId}`);
    if (isSimpleMac() && state.memId) hlOpt(`mem-${state.memId}`);
    if (productType==='pro' && state.proMemId) hlOpt(`mem-${state.proMemId}`);
  }
  if (id === 'storage') {
    if (productType==='air' && state.storageId)  hlOpt(`stor-${state.storageId}`);
    if (isSimpleMac() && state.storageId) hlOpt(`stor-${state.storageId}`);
    if (productType==='pro' && state.proStorId)  hlOpt(`stor-${state.proStorId}`);
  }
  if (id === 'power'   && state.powerId) hlOpt(`power-${state.powerId}`);
  if (id === 'display') hlOpt(`disp-${state.nano?'yes':'no'}`);
  if (id === 'stand' && state.standId) hlOpt(`stand-${state.standId}`);
  if (id === 'ethernet' && state.ethernetId) hlOpt(`eth-${state.ethernetId}`);
  if (id === 'pointing' && state.pointingId) hlOpt(`point-${state.pointingId}`);
  if (id === 'keyboard' && state.keyboardId) hlOpt(`kbd-${state.keyboardId}`);
  if (id === 'gifts') {
    if (state.gift) hlOpt(`gift-item-${state.gift.id}`);
  }
}

//  Price calc
// ═══════════════════════════════════════
function getSimpleMacPrice() {
  const cfg = getSimpleMacConfig();
  if (productType === 'neo') {
    if (!state.storageId) return 0;
    const storageAdj = cfg.storage.find(s => s.id === state.storageId)?.priceAdj || 0;
    return cfg.basePrice + storageAdj;
  }
  if (productType === 'macmini') {
    if (!state.chipId) return 0;
    const chip = cfg.chips.find(c => c.id === state.chipId);
    const memA = (chip?.memory || cfg.memory || []).find(m => m.id === state.memId)?.priceAdj || 0;
    const stoA = (chip?.storage || cfg.storage || []).find(s => s.id === state.storageId)?.priceAdj || 0;
    const ethA = (chip?.ethernet || cfg.ethernet || []).find(e => e.id === state.ethernetId)?.priceAdj || 0;
    return (chip?.basePrice || 0) + memA + stoA + ethA;
  }
  return 0;
}

function getMacBasePrice() {
  if (productType === 'imac') {
    if (!state.imacChipId) return 0;
    const cfg = BTS_CONFIG.products.imac;
    const chip = cfg.chips.find(c => c.id === state.imacChipId);
    const memA = getImacOptionPrice(cfg.memory.find(m => m.id === state.memId));
    const stoA = getImacOptionPrice(cfg.storage.find(s => s.id === state.storageId));
    const standA = getImacOptionPrice(cfg.stand.find(s => s.id === state.standId));
    const ethA = getImacOptionPrice(cfg.ethernet.find(e => e.id === state.ethernetId));
    const pointA = getImacOptionPrice(cfg.pointing.find(p => p.id === state.pointingId));
    const keyA = getImacOptionPrice(cfg.keyboard.find(k => k.id === state.keyboardId));
    return chip.basePrice + memA + stoA + standA + ethA + pointA + keyA + (state.nano ? cfg.nanoPrice : 0);
  } else if (isSimpleMac()) {
    return getSimpleMacPrice();
  } else if (productType === 'air') {
    if (!state.size || !state.chipId) return 0;
    const sz   = BTS_CONFIG.products.macbookAir.sizes[state.size];
    const chip = sz.chips.find(c=>c.id===state.chipId);
    const memA = sz.memory.find(m=>m.id===state.memId)?.priceAdj || 0;
    const stoA = sz.storage.find(s=>s.id===state.storageId)?.priceAdj || 0;
    const powA = sz.power.find(p=>p.id===state.powerId)?.priceAdj || 0;
    return sz.basePrice + (chip?.priceAdj||0) + memA + stoA + powA - getAirHiddenUpgradeDiscount();
  } else {
    if (!state.chipObj) return 0;
    const powA = state.chipObj.power.find(p => p.id === state.powerId)?.priceAdj || 0;
    return state.chipObj.basePrice + state.proMemAdj + state.proStorAdj + powA + (state.nano ? BTS_CONFIG.products.macbookPro.nanoPrice : 0);
  }
}

function calcPrice() {
  const base = getMacBasePrice();
  if (!base) return null;
  const subtotal = base;
  const ccR   = Math.round(subtotal           * (state.creditCard/100));
  const refR  = Math.round((subtotal / 1.05) * (state.referral/100)); // 導購以未稅價計算
  const giftS = 0;
  const final = subtotal - ccR - refR;

  const totalSaved = ccR + refR;

  return { base, giftCost: 0, subtotal, ccR, refR, giftS, final, totalSaved };
}

function updatePrice() {
  const r = calcPrice();
  const fe = document.getElementById('price-final');
  const br = document.getElementById('price-breakdown');
  const sv = document.getElementById('price-saved');
  if (!r) { fe.textContent='NT$–'; br.textContent='請完成規格選擇'; sv.style.display='none'; return; }
  fe.textContent = `NT$${r.final.toLocaleString()}`;
  const parts = [];
  if (r.ccR)  parts.push(`信用卡 -NT$${r.ccR.toLocaleString()}`);
  if (r.refR) parts.push(`導購 -NT$${r.refR.toLocaleString()}`);
  br.textContent = parts.length ? parts.join(' · ') : `定價 NT$${r.subtotal.toLocaleString()}`;
  if (r.totalSaved > 0) { sv.style.display=''; sv.textContent=`合計省下 NT$${r.totalSaved.toLocaleString()}`; }
  else sv.style.display='none';
  checkComplete();
}

function checkComplete() {
  const required = productType === 'imac'
    ? ['color','imacChipId','memId','storageId','nano','standId','ethernetId','pointingId','keyboardId']
    : productType === 'neo'
    ? ['color','memId','storageId']
    : productType === 'macmini'
    ? ['color','chipId','memId','storageId','ethernetId']
    : productType === 'air'
    ? ['size','color','chipId','memId','storageId','powerId']
    : ['size','color','nano','chipFamily','chipObj','proMemId','proStorId','powerId'];
  // nano for pro: always has a value (false is OK)
  const done = required.every(k => state[k] !== null && state[k] !== undefined);
  const btn  = document.getElementById('gen-btn');
  btn.disabled = !done;
  if (done) btn.classList.add('ready'); else btn.classList.remove('ready');
}

        name: state.gift.name,
        price: Number(state.gift.price) || 0,
        originalPrice: Number(state.gift.originalPrice) || 0
      } : null,
      sellGift: !!state.sellGift,
      giftResaleValue: Number(state.giftPrice) || 0
    },
    chip: chipStr, memory: memStr, storage: storStr,
    color: state.color || null,
    nano: !!state.nano,
    creditCardPct: Number(state.creditCard) || 0,
    referralPct: Number(state.referral) || 0,
    subtotal: r.subtotal, ccRebate: r.ccR || 0, refRebate: r.refR || 0,
    final: r.final, totalSaved: r.totalSaved || 0
  };
  const sig = JSON.stringify(rec);
  if (window.__btsLastSig !== sig) {
    window.__btsLastSig = sig;
    if (window.btsTrackResult) btsTrackResult(rec);
    else {
      if (window.btsTrack) btsTrack('generate_recommendation', { product: rec.product, model: rec.model, value: rec.final, currency: 'TWD' });
      if (window.btsLogRecord) btsLogRecord(rec);
    }
  }
}

function rcRow(name, btsP, origP) {
  const saving = origP - btsP;
  const cls    = btsP === 0 ? 'free' : '';
  const val    = btsP === 0 ? '免費' : `NT$${btsP.toLocaleString()}`;
  const sav    = saving > 0 ? ` (省 NT$${saving.toLocaleString()})` : '';
  return `<div class="receipt-item"><span class="receipt-label">${name}</span><span class="receipt-value ${cls}">${val}${sav}</span></div>`;
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target===document.getElementById('modal-overlay')) closeModal(); }
function generateImage() {
  showToast('⏳ 正在載入產品圖片...');

  const r = calcPrice();
  if (!r) { showToast('請先完成所有選擇'); return; }
  if (window.btsTrack) btsTrack('save_list', { product: productType, final: r.final });

  const imgUrl = productType === 'imac'
    ? BTS_CONFIG.products.imac.colorImages?.['24']?.[state.color]
    : productType === 'neo'
      ? BTS_CONFIG.products.macbookNeo.colorImages?.['13']?.[state.color]
      : productType === 'macmini'
        ? BTS_CONFIG.products.macMini.colorImages?.['mini']?.[state.color]
    : productType === 'air'
      ? BTS_CONFIG.products.macbookAir.colorImages?.[state.size]?.[state.color]
      : BTS_CONFIG.products.macbookPro.colorImages?.[state.size]?.[state.color];

  if (!imgUrl) { _drawMacReceipt(null, r); return; }

  const img = new Image();
  img.crossOrigin = 'anonymous';
  let drawn = false;
  const doDraw = (el) => { if (!drawn) { drawn = true; _drawMacReceipt(el, r); } };
  img.onload  = () => doDraw(img);
  img.onerror = () => doDraw(null);
  setTimeout(() => doDraw(null), 4000);
  img.src = imgUrl;
}

function _drawMacReceipt(productImg, r) {
  // ── Build strings ──
  let name, specs;
  if (productType === 'air') {
    const sz = BTS_CONFIG.products.macbookAir.sizes[state.size];
    const ch = sz.chips.find(c => c.id === state.chipId);
    const me = sz.memory.find(m => m.id === state.memId);
    const st = sz.storage.find(s => s.id === state.storageId);
    name  = `MacBook Air ${sz.label}`;
    specs = `${ch.detail} · ${me.name} · ${st.name}`;
  } else if (productType === 'imac') {
    const cfg = BTS_CONFIG.products.imac;
    const ch = cfg.chips.find(c => c.id === state.imacChipId);
    const me = cfg.memory.find(m => m.id === state.memId);
    const st = cfg.storage.find(s => s.id === state.storageId);
    name = 'iMac 24 吋';
    specs = `${ch?.detail || ''} · ${me?.name || ''} · ${st?.name || ''}`;
  } else if (productType === 'neo') {
    const cfg = BTS_CONFIG.products.macbookNeo;
    const st = cfg.storage.find(s => s.id === state.storageId);
    name = 'MacBook Neo 13 吋';
    specs = `${cfg.chip || 'A18 Pro'} · ${cfg.fixedMemory?.name || ''} · ${st?.name || ''}`;
  } else if (productType === 'macmini') {
    const cfg = BTS_CONFIG.products.macMini;
    const ch = cfg.chips.find(c => c.id === state.chipId);
    const me = (ch?.memory || cfg.memory || []).find(m => m.id === state.memId);
    const st = (ch?.storage || cfg.storage || []).find(s => s.id === state.storageId);
    const eth = (ch?.ethernet || cfg.ethernet || []).find(e => e.id === state.ethernetId);
    name = 'Mac mini';
    specs = `${ch?.detail || ''} · ${me?.name || ''} · ${st?.name || ''} · ${eth?.name || ''}`;
  } else {
    const ch = state.chipObj;
    const me = ch.memory.find(m => m.id === state.proMemId);
    const st = ch.storage.find(s => s.id === state.proStorId);
    name  = `MacBook Pro ${BTS_CONFIG.products.macbookPro.sizes[state.size].label}`;
    specs = `${ch.name} ${ch.detail} · ${me?.name||''} · ${st?.name||''}`;
  }
  const colorLine = (state.color || '–') + ((productType === 'pro' || productType === 'imac') && state.nano ? ' · 奈米紋理玻璃' : '');

  btsDrawReceipt({
    productName: name,
    productImg: productImg,
    specString: specs,
    colorString: colorLine,
    priceRows: [
      { label: '教育商店定價', value: `NT$${r.subtotal.toLocaleString()}` },
      { label: `信用卡回饋 (${state.creditCard || 0}%)`,       value: r.ccR  ? `-NT$${r.ccR.toLocaleString()}`  : '—', kind: r.ccR  ? 'deduct' : 'muted' },
      { label: `導購回饋 (${state.referral || 0}%・未稅估算)`, value: r.refR ? `-NT$${r.refR.toLocaleString()}` : '—', kind: r.refR ? 'deduct' : 'muted' }
    ],
    finalValue: `NT$${r.final.toLocaleString()}`,
    savedText: r.totalSaved > 0 ? `合計省下 NT$${r.totalSaved.toLocaleString()}` : null,
    footerProduct: `${productType === 'imac' ? 'iMac' : productType === 'macmini' ? 'Mac mini' : 'MacBook'} BTS優惠計算機`,
    filename: `${productType === 'imac' ? 'iMac' : productType === 'macmini' ? 'MacMini' : 'MacBook'}_BTS購買清單_${new Date().toLocaleDateString('zh-TW').replace(/\//g,'')}.png`
  });
}

// ═══════════════════════════════════════
//  Utilities
// ═══════════════════════════════════════
function hlOpt(id) {
  const el = document.getElementById(id);
  if (!el) return;
  // Clear siblings of same prefix
  const prefix = id.split('-').slice(0,-1).join('-');
  document.querySelectorAll(`[id^="${prefix}-"]`).forEach(x => x.classList.remove('selected'));
  el.classList.add('selected');
}

function setSV(stepId, text) {
  const el = document.getElementById(`sv-${stepId}`);
  if (el) el.textContent = text;
}

function warn(msg) { return `<p style="font-size:13px;color:var(--text-sub);padding:4px 0">${msg}</p>`; }
function esc(s) { return s.replace(/\s/g,''); }

function goBack() {
  window.location.href = typeof google!=='undefined' && google.script
    ? '?' : 'calculator.html';
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

(window.BTS_REFERRAL_READY || Promise.resolve()).finally(init);
</script>
