<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 BTS Calc UI 對照</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "Segoe UI", sans-serif;
      background: #111827;
      color: #fff;
    }

    .compare-shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      width: 100vw;
      height: 100vh;
    }

    .pane {
      position: relative;
      min-width: 0;
      background: #f5f5f7;
      border-right: 1px solid rgba(255, 255, 255, 0.18);
    }

    .pane:last-child {
      border-right: 0;
    }

    .pane-label {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      height: 30px;
      padding: 0 11px;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.84);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      box-shadow: 0 8px 24px rgba(17, 24, 39, 0.18);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      pointer-events: none;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }

    @media (max-width: 760px) {
      .compare-shell {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr;
      }

      .pane {
        border-right: 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.18);
      }

      .pane:last-child {
        border-bottom: 0;
      }
    }
  </style>
</head>
<body>
  <main class="compare-shell" aria-label="新舊 UI 對照">
    <section class="pane" aria-label="原本 UI">
      <div class="pane-label">原本 UI</div>
      <iframe title="原本 UI" src="calculator.html?classic=1"></iframe>
    </section>
    <section class="pane" aria-label="新 UI">
      <div class="pane-label">新 UI</div>
      <iframe title="新 UI" src="calculator.html"></iframe>
    </section>
  </main>
  <script src="bts-analytics-config.js"></script>
  <script src="bts-analytics.js"></script>
</body>
</html>
