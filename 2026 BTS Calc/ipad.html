<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>iPad BTS 優惠計算機</title>
      <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');

    :root {
      --blue:       #0071e3;
      --blue-dark:  #0062c3;
      --green:      #34c759;
      --orange:     #ff9f0a;
      --bg:         #f5f5f7;
      --card-bg:    #ffffff;
      --text:       #1d1d1f;
      --text-sub:   #86868b;
      --border:     rgba(0, 0, 0, 0.08);
      --sel-border: #0071e3;
      --sel-bg:     rgba(0, 113, 227, 0.05);
      --radius-sm:  12px;
      --radius-md:  18px;
      --radius-lg:  26px;
      --shadow-sm:  0 4px 20px rgba(0,0,0,.02);
      --shadow-md:  0 12px 40px rgba(0,0,0,.05);
      --transition: .5s cubic-bezier(0.16, 1, 0.3, 1);
      --safe-top:   env(safe-area-inset-top,0px);
      --safe-bottom:env(safe-area-inset-bottom,0px);

      /* Liquid Glass effect tokens */
      --glass-bg:       rgba(255, 255, 255, 0.65);
      --glass-blur:     blur(20px) saturate(190%);
      --glass-border:   rgba(255, 255, 255, 0.4);
      --glass-shadow:
        0 1px 0 rgba(255, 255, 255, 0.4) inset,
        0 10px 40px rgba(0, 0, 0, 0.02),
        0 1px 3px rgba(0, 0, 0, 0.01);
      --glass-shadow-hover:
        0 1px 0 rgba(255, 255, 255, 0.5) inset,
        0 20px 50px rgba(0, 0, 0, 0.05),
        0 4px 12px rgba(0, 0, 0, 0.02);
    }

    
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { height:100%; font-family:'Inter', -apple-system, BlinkMacSystemFont, 'Noto Sans TC', sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; }

    /* ── Liquid Background Blobs ── */
    .liquid-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
      background: var(--bg);
      transition: background-color 0.5s ease;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.35;
      animation: float 25s infinite alternate ease-in-out;
    }
    .blob-1 {
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, rgba(0, 113, 227, 0.12) 0%, rgba(0, 113, 227, 0) 70%);
      top: -15%;
      left: 10%;
    }
    .blob-2 {
      width: 55vw;
      height: 55vw;
      background: radial-gradient(circle, rgba(94, 92, 230, 0.10) 0%, rgba(94, 92, 230, 0) 70%);
      bottom: -15%;
      right: 10%;
      animation-duration: 30s;
    }
    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -50px) scale(1.05); }
      100% { transform: translate(-15px, 15px) scale(0.95); }
    }

    .app { display:flex; flex-direction:column; min-height:100%; padding-bottom:calc(120px + var(--safe-bottom)); position:relative; z-index:1; }

    /* ── Topbar ── */
    .topbar {
      position:sticky; top:0; z-index:100;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-bottom: 1px solid var(--border);
      padding:calc(12px + var(--safe-top)) 20px 12px;
      display:flex; align-items:center; gap:12px;
      transition: background var(--transition);
    }
    .back-btn { display:inline-flex; align-items:center; gap:4px; color:var(--blue); font-size:15px; font-weight:600; background:none; border:none; cursor:pointer; padding:4px 0; transition: transform var(--transition); }
    .back-btn:hover { transform: translateX(-2px); }
    .back-btn svg { width:10px; height:16px; fill:none; stroke:currentColor; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
    .topbar-title { font-family: 'Outfit', sans-serif; font-size:17px; font-weight:700; flex:1; }
    .designer-chip {
      display:flex;
      align-items:center;
      gap:8px;
      padding:6px 10px 6px 7px;
      border:1px solid rgba(0,113,227,.16);
      border-radius:999px;
      background:rgba(255,255,255,.72);
      box-shadow:0 6px 18px rgba(0,0,0,.05);
      white-space:nowrap;
    }
    .designer-chip-avatar {
      width:24px;
      height:24px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-family:'Outfit', sans-serif;
      font-size:11px;
      font-weight:800;
      background:linear-gradient(135deg,#111827,#0071e3);
    }
    .designer-chip-text {
      display:flex;
      flex-direction:column;
      line-height:1.05;
    }
    .designer-chip-label {
      font-size:8px;
      font-weight:800;
      color:var(--blue);
      text-transform:uppercase;
      letter-spacing:.5px;
    }
    .designer-chip-name {
      font-size:13px;
      font-weight:900;
      color:var(--text);
      letter-spacing:0;
    }
    .receipt-brand {
      margin-top: 12px;
      padding: 13px 14px;
      border: 1px solid rgba(0,113,227,.14);
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(0,113,227,.07), rgba(17,24,39,.035));
      text-align: center;
    }
    .receipt-brand-kicker {
      display:block;
      font-size:10px;
      font-weight:800;
      color:var(--blue);
      text-transform:uppercase;
      letter-spacing:.9px;
      margin-bottom:4px;
    }
    .receipt-brand-name {
      display:block;
      font-family:'Outfit', 'Noto Sans TC', sans-serif;
      font-size:22px;
      font-weight:900;
      color:var(--text);
      letter-spacing:0;
    }
    @media(max-width:520px){
      .topbar { gap:8px; }
      .designer-chip { padding:6px; }
      .designer-chip-text { display:none; }
      .topbar-title { font-size:15px; }
    }
    
    .product-switch { display:flex; background:rgba(0,0,0,0.06); border-radius:8px; padding:2px; gap:2px; }
        .sw-btn { font-size:12px; font-weight:700; padding:4px 14px; border-radius:6px; border:none; background:none; cursor:pointer; color:var(--text-sub); transition:all var(--transition); }
    .sw-btn.active { background:var(--card-bg); color:var(--text); box-shadow:0 2px 6px rgba(0,0,0,.08); }

    /* ── Progress ── */
    .progress-wrap { padding:16px 20px 0; max-width:680px; margin:0 auto; width:100%; }
    .progress-track { height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
    .progress-fill  { height:100%; background:var(--blue); border-radius:2px; transition:width .4s cubic-bezier(.4,0,.2,1); }
    .progress-label { font-size:11px; color:var(--text-sub); margin-top:6px; text-align:right; font-weight:600; }

    /* ── Steps ── */
    .steps-wrap { flex:1; padding:20px 20px 0; max-width:680px; margin:0 auto; width:100%; }
    .step-card {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      border-radius: var(--radius-lg);
      margin-bottom: 12px;
      overflow: hidden;
      transition: all var(--transition);
    }
    .step-card:hover:not(.locked) {
      border-color: rgba(0, 113, 227, 0.15);
      box-shadow: var(--glass-shadow-hover);
    }
    .step-card.locked { opacity:.45; pointer-events:none; }
    .step-header { display:flex; align-items:center; gap:12px; padding:16px 18px; cursor:pointer; }
    .step-num { width:26px; height:26px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; background:rgba(0,0,0,0.03); color:var(--text-sub); border:1.5px solid var(--border); transition:all var(--transition); }
        .step-num.done   { background:var(--green); color:#fff; border-color:var(--green); }
    .step-num.active { background:var(--blue);  color:#fff; border-color:var(--blue);  }
    .step-title { font-size:15.5px; font-weight:700; flex:1; }
    .step-value { font-size:13px; color:var(--text-sub); max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; text-align:right; font-weight:600; }
    .step-body { padding:0 18px 18px; display:none; }
    .step-body.open { display:block; }

    /* ── Option grids ── */
    .opt-grid { display:grid; gap:10px; grid-template-columns:repeat(auto-fill, minmax(140px,1fr)); }
    .opt-grid.cols-2 { grid-template-columns:1fr 1fr; }
    .opt-grid.cols-1 { grid-template-columns:1fr; }
    @media(max-width:360px){ .opt-grid { grid-template-columns:1fr 1fr; } }

    /* ── Option card ── */
    .opt {
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px;
      cursor: pointer;
      text-align: center;
      transition: all var(--transition);
      background: rgba(255,255,255,0.25);
      position: relative;
      overflow: hidden;
    }
        .opt:hover:not(.disabled):not(.selected) {
      border-color: rgba(0, 113, 227, 0.3);
      background: rgba(0, 113, 227, 0.02);
    }
    .opt.selected {
      border-color: var(--sel-border);
      background: var(--sel-bg);
      box-shadow: 0 4px 12px rgba(0, 113, 227, 0.08);
    }
    .opt.selected::after { content:'✓'; position:absolute; top:6px; right:8px; font-size:11px; font-weight:700; color:var(--blue); }
    .opt.disabled { opacity:.4; pointer-events:none; }
    .opt-img { width:100%; max-width:88px; height:64px; object-fit:contain; display:block; margin:0 auto 8px; transition: transform var(--transition); }
    .opt:hover:not(.disabled) .opt-img { transform: scale(1.05); }
    .opt-title { font-size:13px; font-weight:700; margin-bottom:2px; }
    .opt-sub   { font-size:11px; color:var(--text-sub); line-height:1.4; font-weight: 500; }
    .opt-price { font-size:12px; font-weight:700; color:var(--blue); margin-top:4px; }
    .opt-badge { font-size:10px; font-weight:700; color:var(--green); margin-top:2px; }
    .opt-tag   { font-size:10px; background:rgba(0,0,0,0.03); border:1px solid var(--border); border-radius:4px; padding:2px 6px; display:inline-block; margin-top:4px; color:var(--text-sub); font-weight:500; }
    
    /* Color dot */
    .color-dot { width:28px; height:28px; border-radius:50%; margin:0 auto 6px; border:2px solid var(--border); transition:all var(--transition); }
    .opt.selected .color-dot { border-color:var(--blue); transform: scale(1.08); }

    /* Size big card */
    .size-opt {
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 20px 16px;
      cursor: pointer;
      background: rgba(255,255,255,0.25);
      transition: all var(--transition);
      position: relative;
    }
        .size-opt:hover:not(.selected) {
      border-color: rgba(0, 113, 227, 0.3);
      background: rgba(0, 113, 227, 0.02);
    }
    .size-opt.selected {
      border-color: var(--sel-border);
      background: var(--sel-bg);
      box-shadow: 0 4px 12px rgba(0, 113, 227, 0.08);
    }
    .size-opt.selected::after { content:'✓'; position:absolute; top:10px; right:12px; font-size:12px; font-weight:700; color:var(--blue); }
    .size-opt img { width:100%; max-width:120px; height:90px; object-fit:contain; margin-bottom:10px; transition: transform var(--transition); }
    .size-opt:hover img { transform: scale(1.05); }
    .size-opt .sz-label { font-size:16px; font-weight:700; }
    .size-opt .sz-sub   { font-size:12px; color:var(--text-sub); margin-top:2px; font-weight:500; }
    .size-opt .sz-price { font-size:13.5px; font-weight:700; color:var(--blue); margin-top:6px; }

    /* Chip card */
    .chip-opt {
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px;
      cursor: pointer;
      background: rgba(255,255,255,0.25);
      transition: all var(--transition);
      position: relative;
    }
        .chip-opt:hover:not(.selected) {
      border-color: rgba(0, 113, 227, 0.3);
      background: rgba(0, 113, 227, 0.02);
    }
    .chip-opt.selected {
      border-color: var(--sel-border);
      background: var(--sel-bg);
      box-shadow: 0 4px 12px rgba(0, 113, 227, 0.08);
    }
    .chip-opt.selected::after { content:'✓'; position:absolute; top:10px; right:12px; font-size:11px; font-weight:700; color:var(--blue); }
    .chip-name   { font-size:15px; font-weight:700; }
    .chip-detail { font-size:12px; color:var(--text-sub); margin-bottom:4px; font-weight:500; }
    .chip-price  { font-size:13.5px; font-weight:700; color:var(--blue); margin:6px 0 2px; }
    .chip-includes { font-size:11px; color:var(--text-sub); line-height:1.5; font-weight:500; }
    .chip-desc   { font-size:11px; color:var(--text-sub); margin-top:4px; padding-top:4px; border-top:1px solid var(--border); font-weight:500; }

    /* Warning banner */
    .warn-banner { background:rgba(255, 159, 10, 0.1); border:1px solid rgba(255, 159, 10, 0.3); border-radius:var(--radius-sm); padding:10px 12px; font-size:12px; color:var(--orange); margin-bottom:10px; line-height:1.5; font-weight:500; }

    /* Gift rows */
    .gift-section { margin-bottom:16px; }
    .gift-section-title { font-size:12px; font-weight:700; color:var(--text-sub); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
    .gift-opt {
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      cursor: pointer;
      background: rgba(255,255,255,0.25);
      margin-bottom: 8px;
      transition: all var(--transition);
    }
        .gift-opt:hover:not(.selected) {
      border-color: rgba(0, 113, 227, 0.3);
      background: rgba(0, 113, 227, 0.02);
    }
    .gift-opt.selected {
      border-color: var(--blue);
      background: var(--sel-bg);
      box-shadow: 0 4px 12px rgba(0, 113, 227, 0.08);
    }
    .gift-info { flex:1; }
    .gift-name { font-size:13px; font-weight:700; }
    .gift-tag  { font-size:11px; color:var(--green); font-weight:700; margin-top:2px; }
    .gift-tag.paid    { color:var(--blue); }
    .gift-tag.neutral { color:var(--text-sub); }
    .gift-radio { width:20px; height:20px; border-radius:50%; border:2px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:var(--transition); }
    .gift-opt.selected .gift-radio { border-color:var(--blue); background:var(--blue); }
    .gift-opt.selected .gift-radio::after { content:''; width:8px; height:8px; border-radius:50%; background:#fff; }

    /* Rebate */
    .rebate-row { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
    .rebate-label { font-size:14px; font-weight:600; flex:1; }
    .rebate-select { background:rgba(0,0,0,0.03); border:1.5px solid var(--border); border-radius:8px; padding:8px 12px; font-size:14px; font-family:inherit; color:var(--text); outline:none; cursor:pointer; min-width:90px; transition:all var(--transition); font-weight:600; }
        .rebate-select:focus { border-color:var(--blue); box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15); }
    
    .sell-gift-row { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
    .sell-gift-row label { font-size:14px; font-weight:600; flex:1; }
    
    .toggle-switch { position:relative; width:44px; height:26px; cursor:pointer; }
    .toggle-switch input { opacity:0; width:0; height:0; }
    .toggle-track { position:absolute; inset:0; background:var(--border); border-radius:13px; transition:background var(--transition); }
    .toggle-thumb { position:absolute; top:3px; left:3px; width:20px; height:20px; background:#fff; border-radius:50%; box-shadow:0 1px 4px rgba(0,0,0,.2); transition:transform var(--transition); }
    .toggle-switch input:checked + .toggle-track { background:var(--green); }
    .toggle-switch input:checked ~ .toggle-thumb { transform:translateX(18px); }
    
    .gift-price-wrap { display:none; margin-top:8px; }
    .gift-price-wrap.show { display:block; }
    .gift-price-input { width:100%; padding:10px 14px; border:1.5px solid var(--border); border-radius:8px; font-size:14px; font-family:inherit; background:rgba(0,0,0,0.03); outline:none; transition:all var(--transition); font-weight:600; color:var(--text); }
        .gift-price-input:focus { border-color:var(--blue); box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15); }

    /* ── 回饋數字輸入 ── */
    .rebate-input-wrap {
      display: flex; align-items: center; gap: 2px;
      background: rgba(0,0,0,.03); border: 1.5px solid var(--border);
      border-radius: 8px; padding: 0 10px; min-width: 80px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
        .rebate-input-wrap:focus-within { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(0,113,227,.15); }
    .rebate-input {
      width: 52px; padding: 8px 0; border: none; background: transparent;
      font-size: 15px; font-weight: 600; font-family: inherit;
      color: var(--text); outline: none; text-align: right;
      -moz-appearance: textfield;
    }
    .rebate-input::-webkit-outer-spin-button,
    .rebate-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .rebate-unit { font-size: 14px; color: var(--text-sub); font-weight: 500; }
    .rebate-note { font-size: 11.5px; color: var(--text-sub); line-height: 1.5; margin: -4px 0 12px; padding: 8px 10px; background: rgba(255,159,10,.08); border-left: 2.5px solid var(--orange); border-radius: 0 6px 6px 0; }

    /* ── 贈品用途選擇 ── */
    .sell-gift-section { margin-top: 4px; }
    .sell-section-label { font-size: 13px; font-weight: 600; color: var(--text-sub); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .4px; }
    .sell-opts { display: flex; gap: 8px; margin-bottom: 0; }
    .sell-opt {
      flex: 1; padding: 11px 8px; border-radius: 12px; font-size: 13px; font-weight: 600;
      border: 1.5px solid var(--border); background: transparent; color: var(--text-sub);
      cursor: pointer; transition: var(--transition); text-align: center; line-height: 1.3;
    }
    .sell-opt:active { transform: scale(.97); }
    .sell-opt.active { border-color: var(--blue); background: rgba(0,113,227,.08); color: var(--blue); }
        .rebate-cta-btn {
      margin-top: 20px; width: 100%; padding: 15px; border-radius: 14px;
      background: var(--blue); color: #fff; border: none; cursor: pointer;
      font-size: 15px; font-weight: 700; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 16px rgba(0,113,227,.3);
      transition: all var(--transition);
    }
    .rebate-cta-btn:hover  { background: var(--blue-dark); box-shadow: 0 6px 20px rgba(0,113,227,.4); }
    .rebate-cta-btn:active { transform: scale(.97); }

    /* Price bar */
    .price-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-top: 1px solid var(--border);
      padding: 14px 20px calc(14px + var(--safe-bottom));
      z-index: 90;
      box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.02);
      transition: background var(--transition);
    }
    .price-bar-inner { max-width:680px; margin:0 auto; display:flex; align-items:center; gap:14px; }
    .price-nums { flex:1; }
    .price-final { font-family: 'Outfit', sans-serif; font-size:22px; font-weight:800; line-height:1.2; }
    .price-breakdown { font-size:12px; color:var(--text-sub); margin-top:2px; line-height:1.5; font-weight:500; }
    .price-saved { font-size:12px; font-weight:700; color:var(--green); }
    
    .gen-btn {
      background:var(--blue);
      color:#fff;
      font-size:14px;
      font-weight:700;
      padding:12px 22px;
      border-radius:22px;
      border:none;
      cursor:pointer;
      white-space:nowrap;
      transition:all var(--transition);
      display:flex;
      align-items:center;
      gap:6px;
      box-shadow: 0 4px 12px rgba(0, 113, 227, 0.2);
    }
    .gen-btn:active { transform:scale(.97); }
    .gen-btn:disabled { background:var(--border); color:var(--text-sub); cursor:not-allowed; box-shadow:none; }
    .gen-btn.ready { background:var(--green); box-shadow: 0 4px 12px rgba(52, 199, 89, 0.2); }
    .gen-btn svg { width:16px; height:16px; fill:none; stroke:currentColor; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }

    /* Modal */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:200; display:none; align-items:flex-end; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
    .modal-overlay.open { display:flex; animation:fadeIn .25s ease; }
    @keyframes fadeIn { from{opacity:0} }
    .modal-sheet {
      background: var(--card-bg);
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-height: 92vh;
      overflow-y: auto;
      padding: 24px 20px calc(24px + var(--safe-bottom));
      animation: slideUp .4s cubic-bezier(0.16, 1, 0.3, 1);
      border-top: 1px solid var(--border);
      box-shadow: var(--shadow-md);
    }
    @keyframes slideUp { from{transform:translateY(100%)} }
    .modal-handle { width:40px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 20px; }
    .modal-title { font-family: 'Outfit', sans-serif; font-size:20px; font-weight:800; margin-bottom:20px; text-align:center; }
    .receipt-item { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--border); }
    .receipt-item:last-child { border-bottom:none; }
    .receipt-label { font-size:14px; color:var(--text-sub); font-weight:500; }
    .receipt-value { font-size:14px; font-weight:600; }
    .receipt-value.free   { color:var(--green); font-weight:700; }
    .receipt-value.deduct { color:var(--blue); }
    .receipt-divider { border:none; border-top:1.5px solid var(--border); margin:12px 0; }
    .receipt-total { display:flex; justify-content:space-between; align-items:center; padding:14px 0; }
    .receipt-total-label { font-size:17px; font-weight:800; }
    .receipt-total-value { font-family: 'Outfit', sans-serif; font-size:22px; font-weight:800; color:var(--blue); }
    
    .receipt-saved-row { background:rgba(52, 199, 89, 0.1); border: 1px solid rgba(52, 199, 89, 0.2); border-radius:10px; padding:10px 14px; display:flex; align-items:center; gap:8px; margin:8px 0 20px; justify-content: center; }
    .receipt-saved-row span { font-size:13px; font-weight:700; color:#1a7a3b; }
        
    .modal-actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px; }
    .modal-btn { padding:13px; border-radius:14px; font-size:14px; font-weight:700; border:none; cursor:pointer; transition:all var(--transition); display:flex; align-items:center; justify-content:center; gap:6px; }
    .modal-btn:active { transform: scale(0.97); }
    .modal-btn.primary   { background:var(--blue); color:#fff; box-shadow:0 4px 12px rgba(0, 113, 227, 0.2); }
    .modal-btn.primary:hover { background:var(--blue-dark); box-shadow:0 6px 16px rgba(0, 113, 227, 0.35); }
    .modal-btn.secondary { background:rgba(0,0,0,0.03); color:var(--text); border:1.5px solid var(--border); }
        
    .purchase-links { margin-top:16px; }
    .purchase-links-title { font-size:13px; font-weight:700; color:var(--text-sub); margin-bottom:10px; }
    .purchase-link-btn { display:flex; align-items:center; gap:10px; padding:12px 14px; border-radius:12px; text-decoration:none; font-size:14px; font-weight:700; margin-bottom:8px; transition:all var(--transition); }
    .purchase-link-btn:active { transform: scale(0.97); }
    .purchase-link-btn.line    { background:#06c755; color:#fff; box-shadow:0 4px 12px rgba(6, 199, 85, 0.2); }
    .purchase-link-btn.official { background:var(--text); color:var(--bg); }

    /* Toast */
    .toast { position:fixed; bottom:calc(100px + var(--safe-bottom)); left:50%; transform:translateX(-50%) translateY(20px); background:rgba(0,0,0,.85); color:#fff; font-size:13px; font-weight:600; padding:10px 20px; border-radius:20px; z-index:300; opacity:0; transition:all var(--transition); white-space:nowrap; pointer-events:none; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* Price preview card */
    .price-preview-inline { background:var(--sel-bg); border:1.5px solid rgba(0, 113, 227, 0.15); border-radius:var(--radius-sm); padding:10px 14px; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
    .price-preview-inline .ppi-label { font-size:12px; color:var(--text-sub); flex:1; font-weight:600; }
    .price-preview-inline .ppi-val   { font-size:16px; font-weight:700; color:var(--blue); }

    @media(min-width:540px){ .opt-grid { grid-template-columns:repeat(3,1fr); } .opt-grid.cols-2 { grid-template-columns:1fr 1fr; } }
    @media(min-width:680px){ .steps-wrap,.progress-wrap { padding-left:32px; padding-right:32px; } .topbar { padding-left:32px; padding-right:32px; } }
  </style>

<script>
// ═══════════════════════════════════════════
//  狀態
// ═══════════════════════════════════════════
let productType = 'air';   // 'air' | 'pro'
let cfg = null;            // 指向 BTS_CONFIG.products.ipadAir / ipadPro

const state = {
  size:         null,  // '11' | '13'
  color:        null,
  storageId:    null,
  connectivity: 'wifi', // 'wifi' | 'cellular'
  nano:         false,
  gift:         null,
  creditCard:   0,
  referral:     0,
  sellGift:     false,
  giftPrice:    0
};

// 步驟定義（動態生成）
const TOTAL_STEPS = 6; // size, color, storage, connectivity, nano(pro only), rebate

// ═══════════════════════════════════════════
//  初始化
// ═══════════════════════════════════════════
function init() {
  // 從 URL 讀取 product
  const params = new URLSearchParams(window.location.search);
  const p = params.get('product');
  productType = (p === 'pro') ? 'pro' : 'air';
  updateProductConfig();
  renderSteps();
  updateSwitchUI();
  updatePrice();
}

function updateProductConfig() {
  cfg = productType === 'air'
    ? BTS_CONFIG.products.ipadAir
    : BTS_CONFIG.products.ipadPro;

  document.getElementById('topbar-title').textContent =
    productType === 'air' ? 'iPad Air 計算機' : 'iPad Pro 計算機';

  // 重置狀態
  Object.assign(state, {
    size: null, color: null, storageId: null,
    connectivity: 'wifi', nano: productType === 'pro' ? null : false,
    gift: null,
    creditCard: 0, referral: 0, sellGift: false, giftPrice: 0
  });
}

function switchProduct(type) {
  if (productType === type) return;
  productType = type;
  updateProductConfig();
  renderSteps();
  updateSwitchUI();
  updatePrice();
}

function updateSwitchUI() {
  document.getElementById('switch-air').classList.toggle('active', productType === 'air');
  document.getElementById('switch-pro').classList.toggle('active', productType === 'pro');
}

// ═══════════════════════════════════════════
//  步驟渲染
// ═══════════════════════════════════════════
function renderSteps() {
  const wrap = document.getElementById('steps-wrap');
  const hasNano = productType === 'pro';
  const steps = buildStepDefs(hasNano);

  wrap.innerHTML = steps.map((s, i) => renderStepCard(s, i, steps.length)).join('');
  openStep(0);
  updateProgress(steps);
}

function buildStepDefs(hasNano) {
  return [
    { id: 'size',          title: '選擇尺寸',       icon: '' },
    { id: 'color',         title: '選擇顏色',       icon: '' },
    { id: 'storage',       title: '選擇容量',       icon: '' },
    ...(hasNano ? [{ id: 'nano', title: '顯示器玻璃', icon: '' }] : []),
    { id: 'connectivity',  title: '選擇連線方式',   icon: '' },
    { id: 'rebate',        title: '回饋試算',       icon: '' }
  ];
}

function renderStepCard(step, idx, total) {
  return `
  <div class="step-card locked" id="step-card-${step.id}">
    <div class="step-header" onclick="toggleStep('${step.id}')">
      <div class="step-num" id="step-num-${step.id}">${idx + 1}</div>
      <span class="step-title">${step.icon} ${step.title}</span>
      <span class="step-value" id="step-value-${step.id}"></span>
    </div>
    <div class="step-body" id="step-body-${step.id}">
      ${renderStepBody(step.id)}
    </div>
  </div>`;
}

function renderStepBody(stepId) {
  switch (stepId) {
    case 'size':         return renderSizeStep();
    case 'color':        return renderColorStep();
    case 'storage':      return renderStorageStep();
    case 'connectivity': return renderConnectivityStep();
    case 'nano':         return renderNanoStep();
    case 'gifts':        return renderGiftsStep();
    case 'rebate':       return renderRebateStep();
    default: return '';
  }
}

// ── Size ──
function renderSizeStep() {
  const sizes = Object.entries(cfg.sizes);
  return `<div class="option-grid cols-2">
    ${sizes.map(([sz, data]) => {
      const minP = Math.min(...data.storage.map(s => s.price));
      const img = cfg.colorImages?.[sz]?.['太空灰色'] || cfg.colorImages?.[sz]?.['太空黑色'] || '';
      return `<div class="size-opt" id="size-opt-${sz}" onclick="selectSize('${sz}')">
        <img src="${img}" alt="${sz}吋" onerror="this.style.display='none'">
        <span class="size-label">${data.label}</span>
        <span class="size-price">NT$${minP.toLocaleString()} 起</span>
      </div>`;
    }).join('')}
  </div>`;
}

// ── Color ──
function renderColorStep() {
  const colorMap = {
    '太空灰色': '#6d6d72', '藍色': '#5b8db8', '紫色': '#9b7ebf',
    '星光色': '#e8e0d0', '太空黑色': '#1c1c1e', '銀色': '#e5e5ea'
  };
  return `<div class="option-grid" id="color-grid">
    ${cfg.colors.map(c => `
    <div class="opt" id="color-opt-${c.replace(/\s/g,'')}" onclick="selectColor('${c}')">
      <div class="color-dot" style="background:${colorMap[c] || '#ccc'}"></div>
      <div class="opt-title">${c}</div>
    </div>`).join('')}
  </div>`;
}

// ── Storage ──
function renderStorageStep() {
  if (!state.size) return `<p style="font-size:13px;color:var(--text-sub)">請先選擇尺寸</p>`;
  const storageList = cfg.sizes[state.size].storage;
  return `<div class="option-grid" id="storage-grid">
    ${storageList.map(s => {
      const chipSpec = s.ram ? `<div class="opt-chip-spec">${s.ram} / ${s.cpu} / ${s.gpu}</div>` : '';
      return `<div class="opt" id="storage-opt-${s.id}" onclick="selectStorage('${s.id}')">
        <div class="opt-title">${s.name}</div>
        <div class="opt-price">NT$${s.price.toLocaleString()}</div>
        ${chipSpec}
      </div>`;
    }).join('')}
  </div>`;
}

// ── Connectivity ──
function renderConnectivityStep() {
  if (!state.size || !state.storageId) return `<p style="font-size:13px;color:var(--text-sub)">請先選擇容量</p>`;
  const baseP = getBasePrice();
  const cellExtra = cfg.sizes[state.size].cellularExtra;
  return `<div class="connectivity-grid">
    <div class="opt" id="conn-wifi" onclick="selectConnectivity('wifi')">
      <div class="opt-title">Wi-Fi</div>
      <div class="opt-price">NT$${baseP.toLocaleString()}</div>
    </div>
    <div class="opt" id="conn-cellular" onclick="selectConnectivity('cellular')">
      <div class="opt-title">Wi-Fi + 行動網路</div>
      <div class="opt-price">NT$${(baseP + cellExtra).toLocaleString()}</div>
      <div class="opt-sub">+NT$${cellExtra.toLocaleString()}</div>
    </div>
  </div>`;
}

// ── Nano (Pro only) ──
function renderNanoStep() {
  const storageOpt = state.storageId ? cfg.sizes[state.size]?.storage.find(s => s.id === state.storageId) : null;
  const eligible   = storageOpt && cfg.nanoEligible?.includes(state.storageId);
  const notice = !eligible
    ? `<div class="nano-notice">⚠️ 奈米紋理玻璃僅適用於 1TB 或 2TB 機型。</div>`
    : '';

  return `${notice}
  <div class="option-grid cols-2">
    <div class="opt" id="nano-opt-no" onclick="selectNano(false)">
      <div class="opt-title">標準玻璃</div>
      <div class="opt-sub">預設配置</div>
      <div class="opt-price">不加價</div>
    </div>
    <div class="opt ${!eligible ? 'locked' : ''}" id="nano-opt-yes" onclick="${eligible ? "selectNano(true)" : ''}">
      <div class="opt-title">奈米紋理玻璃</div>
      <div class="opt-sub">減少眩光</div>
      <div class="opt-price">+NT$${cfg.nanoPrice.toLocaleString()}</div>
      ${!eligible ? '<div class="opt-badge" style="color:var(--text-sub)">需選 1TB+</div>' : ''}
    </div>
  </div>`;
}

// ── Gifts ──
function buildGiftList() {
  const combos = getMatchingGiftCombos('ipad', productType, state.size);
  if (combos.length) {
    return [
      ...combos,
      { id: 'none', name: '不加購配件', btsPrice: 0, originalPrice: 0, tag: '略過此步驟' }
    ];
  }

  const gifts = BTS_CONFIG.btsGifts;
  const sz = state.size || '11';
  const list = [];
  gifts.ipadPencil.filter(g => g.id !== 'none').forEach(g => {
    list.push({ id: g.id, name: g.name, btsPrice: g.btsPrice ?? 0, originalPrice: g.originalPrice, tag: g.tag });
  });
  const kbSrc = productType === 'air' ? gifts.ipadAirKeyboard : gifts.ipadProKeyboard;
  (kbSrc[sz] || kbSrc['11'] || []).filter(g => g.id !== 'none').forEach(g => {
    list.push({ id: 'kb_' + sz + '_' + g.id, name: g.name, btsPrice: g.btsPrice ?? 0, originalPrice: g.originalPrice, tag: g.tag });
  });
  gifts.ipadAirpods.filter(g => g.id !== 'none').forEach(g => {
    list.push({ id: g.id, name: g.name, btsPrice: g.btsPrice ?? 0, originalPrice: g.originalPrice, tag: g.tag });
  });
  list.push({ id: 'none', name: '不加購配件', btsPrice: 0, originalPrice: 0, tag: '略過此步驟' });
  return list;
}

function getMatchingGiftCombos(productLine, product, size) {
  const combos = Array.isArray(BTS_CONFIG.btsGiftCombos) ? BTS_CONFIG.btsGiftCombos : [];
  return combos
    .filter(combo => combo && combo.active !== false)
    .filter(combo => combo.productLine === 'all' || combo.productLine === productLine)
    .filter(combo => combo.product === 'all' || combo.product === product)
    .filter(combo => !Array.isArray(combo.sizes) || combo.sizes.length === 0 || combo.sizes.includes(String(size)))
    .sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0))
    .map(combo => ({
      id: combo.id || `combo_${combo.name}`,
      name: combo.name,
      btsPrice: getComboTotal(combo, 'btsPrice'),
      originalPrice: getComboTotal(combo, 'originalPrice'),
      tag: combo.tag || buildComboTag(combo),
      items: combo.items || []
    }));
}

function getComboTotal(combo, field) {
  if (Array.isArray(combo.items)) {
    return combo.items.reduce((sum, item) => sum + (Number(item[field]) || 0), 0);
  }
  return Number(combo[field]) || 0;
}

function buildComboTag(combo) {
  const names = Array.isArray(combo.items) ? combo.items.map(item => item.name).filter(Boolean) : [];
  return names.length ? names.join(' + ') : '';
}

function renderGiftsStep() {
  return buildGiftList().map(g => {
    const isSelected = state.gift?.id === g.id;
    const tagClass = g.id === 'none' ? 'neutral' : g.btsPrice > 0 ? 'paid' : '';
    return `<div class="gift-opt${isSelected ? ' selected' : ''}" id="gift-item-${g.id}"
      onclick='selectGift(${JSON.stringify(g.id)}, ${g.btsPrice}, ${g.originalPrice}, ${JSON.stringify(g.name)})'>
      <div class="gift-info">
        <div class="gift-name">${g.name}</div>
        <div class="gift-tag ${tagClass}">${g.tag}</div>
      </div>
      <div class="gift-radio"></div>
    </div>`;
  }).join('');
}

// ── Rebate ──
function renderRebateStep() {
  return `
  <div class="rebate-row">
    <span class="rebate-label">💳 信用卡回饋</span>
    <div class="rebate-input-wrap">
      <input type="number" inputmode="decimal" class="rebate-input" min="0" max="30" step="0.1"
             placeholder="0" value="${state.creditCard || ''}"
             oninput="setRebate('creditCard', this.value)">
      <span class="rebate-unit">%</span>
    </div>
  </div>
  <div class="rebate-row">
    <span class="rebate-label">🔗 導購回饋</span>
    <div class="rebate-input-wrap">
      <input type="number" inputmode="decimal" class="rebate-input" min="0" max="30" step="0.1"
             placeholder="0" value="${state.referral || ''}"
             oninput="setRebate('referral', this.value)">
      <span class="rebate-unit">%</span>
    </div>
  </div>
  <p class="rebate-note">⚠️ 導購回饋以未稅價（÷1.05）粗估，數字僅供參考，實際金額依導購系統回饋為主</p>
  <div class="sell-gift-section" style="margin-top:16px">
    <p class="sell-section-label">贈品用途</p>
    <div class="sell-opts">
      <button class="sell-opt${!state.sellGift ? ' active' : ''}" onclick="setSellGift(false)">🤍 自己留著</button>
      <button class="sell-opt${state.sellGift ? ' active' : ''}" onclick="setSellGift(true)">💰 轉售變現</button>
    </div>
    ${state.sellGift ? `<input class="gift-price-input" type="number" inputmode="numeric"
      placeholder="預估轉售金額（NT$）" min="0" value="${state.giftPrice || ''}"
      oninput="setGiftPrice(this.value)" style="margin-top:10px">` : ''}
  </div>
  <button class="rebate-cta-btn" onclick="startCalc()">
    查看計算結果
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </button>`;
}

// ═══════════════════════════════════════════
//  Step 開關邏輯
// ═══════════════════════════════════════════
function openStep(idx) {
  const steps = buildStepDefs(productType === 'pro');
  steps.forEach((s, i) => {
    const card = document.getElementById(`step-card-${s.id}`);
    const body = document.getElementById(`step-body-${s.id}`);
    const num  = document.getElementById(`step-num-${s.id}`);
    if (!card) return;

    if (i < idx) {
      card.classList.remove('locked');
      body.classList.remove('open');
      num.classList.remove('active'); num.classList.add('done');
      num.textContent = '✓';
    } else if (i === idx) {
      card.classList.remove('locked');
      body.classList.add('open');
      num.classList.add('active'); num.classList.remove('done');
      num.textContent = i + 1;
      // 重新渲染 body（確保依賴前步驟的內容是最新的）
      body.innerHTML = renderStepBody(s.id);
      // scroll to
      setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
    } else {
      card.classList.add('locked');
      body.classList.remove('open');
      num.classList.remove('active', 'done');
      num.textContent = i + 1;
    }
  });
}

function toggleStep(stepId) {
  const steps = buildStepDefs(productType === 'pro');
  const idx   = steps.findIndex(s => s.id === stepId);
  const card  = document.getElementById(`step-card-${stepId}`);
  if (card.classList.contains('locked')) return;
  const body  = document.getElementById(`step-body-${stepId}`);
  if (!body.classList.contains('open')) {
    openStep(idx);
  }
}

function advanceToStep(stepId) {
  const steps = buildStepDefs(productType === 'pro');
  const idx   = steps.findIndex(s => s.id === stepId);
  openStep(idx);
  updateProgress(steps);
}

function updateProgress(steps) {
  const done   = steps.filter(s => getStepValue(s.id) !== null).length;
  const pct    = Math.round((done / steps.length) * 100);
  document.getElementById('progress-fill').style.width  = pct + '%';
  document.getElementById('progress-label').textContent = `步驟 ${done} / ${steps.length}`;
}

function getStepValue(stepId) {
  switch (stepId) {
    case 'size':         return state.size;
    case 'color':        return state.color;
    case 'storage':      return state.storageId;
    case 'connectivity': return state.connectivity;
    case 'nano':         return state.nano !== null ? String(state.nano) : null;
    case 'gifts':        return state.gift;
    case 'rebate':       return 'done'; // always considered filled
    default: return null;
  }
}

// ═══════════════════════════════════════════
//  選擇動作
// ═══════════════════════════════════════════
function selectSize(sz) {
  state.size = sz;
  state.storageId = null; // reset downstream
  state.nano = productType === 'pro' ? null : false;

  selectOptUI('size-opt', sz);
  setStepValue('size', cfg.sizes[sz].label);
  showToast(`已選擇 ${cfg.sizes[sz].label}`);
  advanceToStep('color');
  updatePrice();
}

function selectColor(c) {
  state.color = c;
  // 更新圖片
  const img = cfg.colorImages?.[state.size]?.[c];
  if (img) {
    document.querySelectorAll('.size-opt img').forEach(el => { el.src = img; });
  }
  selectOptUI('color-opt', c.replace(/\s/g,''));
  setStepValue('color', c);
  showToast(`已選擇 ${c}`);
  advanceToStep('storage');
  updatePrice();
}

function selectStorage(id) {
  state.storageId = id;
  state.nano = productType === 'pro' ? null : false;  // reset nano when storage changes

  const s = cfg.sizes[state.size].storage.find(x => x.id === id);
  selectOptUI('storage-opt', id);
  setStepValue('storage', `${s.name}${s.ram ? ' / '+s.ram : ''}`);
  showToast(`已選擇 ${s.name}`);
  advanceToStep(productType === 'pro' ? 'nano' : 'connectivity');
  updatePrice();
}

function selectConnectivity(type) {
  state.connectivity = type;
  selectOptUI('conn', type);
  setStepValue('connectivity', type === 'wifi' ? 'Wi-Fi' : 'Wi-Fi + 行動網路');
  advanceToStep('rebate');
  updatePrice();
}

function selectNano(val) {
  if (val && !cfg.nanoEligible?.includes(state.storageId)) return;
  state.nano = val;
  selectOptUI('nano-opt', val ? 'yes' : 'no');
  setStepValue('nano', val ? '奈米紋理玻璃 +NT$3,500' : '標準玻璃');
  advanceToStep('connectivity');
  updatePrice();
}

function selectGift(id, price, originalPrice, name) {
  state.gift = { id, price, originalPrice, name };
  document.querySelectorAll('[id^="gift-item-"]').forEach(el => el.classList.remove('selected'));
  document.getElementById(`gift-item-${id}`)?.classList.add('selected');
  setStepValue('gifts', id === 'none' ? '不加購' : name);
  advanceToStep('rebate');
  updatePrice();
}

function setRebate(type, val) {
  state[type] = parseFloat(val) || 0;
  updatePrice();
  checkComplete();
}

function setSellGift(val) {
  state.sellGift = val;
  if (!val) state.giftPrice = 0;
  const body = document.getElementById('step-body-rebate');
  if (body && body.classList.contains('open')) body.innerHTML = renderRebateStep();
  updatePrice();
}

function setGiftPrice(val) {
  state.giftPrice = parseFloat(val) || 0;
  updatePrice();
}

// ═══════════════════════════════════════════
//  UI 輔助
// ═══════════════════════════════════════════
function selectOptUI(prefix, key) {
  document.querySelectorAll(`[id^="${prefix}-"]`).forEach(el => el.classList.remove('selected'));
  document.getElementById(`${prefix}-${key}`)?.classList.add('selected');
}

function setStepValue(stepId, text) {
  const el = document.getElementById(`step-value-${stepId}`);
  if (el) el.textContent = text;
}

// ═══════════════════════════════════════════
//  價格計算
// ═══════════════════════════════════════════
function getBasePrice() {
  if (!state.size || !state.storageId) return 0;
  const s = cfg.sizes[state.size].storage.find(x => x.id === state.storageId);
  return s ? s.price : 0;
}

function calcPrice() {
  let base = getBasePrice();
  if (!base) return null;

  if (state.connectivity === 'cellular')
    base += cfg.sizes[state.size].cellularExtra;

  if (state.nano && productType === 'pro')
    base += cfg.nanoPrice;

  const giftCost = state.gift?.price || 0;
  const subtotal = base;

  const ccRebate  = Math.round(subtotal              * (state.creditCard / 100));
  const refRebate = Math.round((subtotal / 1.05)     * (state.referral   / 100)); // 導購以未稅價計算
  const giftSale  = 0;
  const final     = subtotal - ccRebate - refRebate;

  const totalSaved = ccRebate + refRebate;

  return { base, giftCost: 0, subtotal, ccRebate, refRebate, giftSale, final, totalSaved };
}

function getBtsGiftOriginalTotal() {
  return state.gift?.originalPrice || 0;
}

function updatePrice() {
  const r = calcPrice();
  const finalEl = document.getElementById('price-final');
  const breakEl = document.getElementById('price-breakdown');
  const savedEl = document.getElementById('price-saved');

  if (!r) {
    finalEl.textContent = 'NT$–';
    breakEl.textContent = '請完成規格選擇';
    savedEl.style.display = 'none';
    return;
  }

  finalEl.textContent = `NT$${r.final.toLocaleString()}`;

  const parts = [];
  if (r.ccRebate)  parts.push(`信用卡 -NT$${r.ccRebate.toLocaleString()}`);
  if (r.refRebate) parts.push(`導購 -NT$${r.refRebate.toLocaleString()}`);
  breakEl.textContent = parts.length ? parts.join(' · ') : `定價 NT$${r.subtotal.toLocaleString()}`;

  if (r.totalSaved > 0) {
    savedEl.style.display = '';
    savedEl.textContent = `合計省下 NT$${r.totalSaved.toLocaleString()}`;
  } else {
    savedEl.style.display = 'none';
  }

  checkComplete();
}

function checkComplete() {
  const hasNano = productType === 'pro';
  const required = ['size','color','storageId','connectivity'];
  if (hasNano) required.push('nano');
  const done = required.every(k => state[k] !== null && state[k] !== undefined);
  const btn  = document.getElementById('generate-btn');
  btn.disabled = !done;
  if (done) btn.classList.add('ready'); else btn.classList.remove('ready');
}

// ═══════════════════════════════════════════
//  Modal
// ═══════════════════════════════════════════
// 計算動畫（約 3 秒）→ 開啟購買清單
function startCalc() {
  const r = calcPrice();
  if (!r) { showToast('請先完成所有選擇'); return; }
  if (typeof btsCalcAnimation === 'function') {
    btsCalcAnimation(r.final, openModal);
  } else {
    openModal();
  }
}

function openModal() {
  const r = calcPrice();
  if (!r) return;

  const sizeCfg    = cfg.sizes[state.size];
  const storageCfg = sizeCfg.storage.find(s => s.id === state.storageId);

  const productName = `iPad ${productType === 'air' ? 'Air' : 'Pro'} ${sizeCfg.label}`;

  let html = `
  <div class="receipt-item">
    <span class="receipt-label">產品</span>
    <span class="receipt-value">${productName}</span>
  </div>
  <div class="receipt-item">
    <span class="receipt-label">顏色</span>
    <span class="receipt-value">${state.color || '–'}</span>
  </div>
  <div class="receipt-item">
    <span class="receipt-label">容量</span>
    <span class="receipt-value">${storageCfg?.name || '–'}${storageCfg?.ram ? ' / '+storageCfg.ram : ''}</span>
  </div>
  <div class="receipt-item">
    <span class="receipt-label">連線</span>
    <span class="receipt-value">${state.connectivity === 'wifi' ? 'Wi-Fi' : 'Wi-Fi + 行動網路'}</span>
  </div>`;

  if (productType === 'pro') {
    html += `<div class="receipt-item">
      <span class="receipt-label">顯示器玻璃</span>
      <span class="receipt-value">${state.nano ? '奈米紋理玻璃' : '標準玻璃'}</span>
    </div>`;
  }

  html += `<hr class="receipt-divider">`;

  html += `<hr class="receipt-divider">
  <div class="receipt-item">
    <span class="receipt-label">教育商店定價</span>
    <span class="receipt-value">NT$${r.subtotal.toLocaleString()}</span>
  </div>`;

  html += `<div class="receipt-item"><span class="receipt-label">信用卡回饋 (${state.creditCard || 0}%)</span><span class="receipt-value ${r.ccRebate ? 'deduct' : 'muted'}">${r.ccRebate ? '-NT$' + r.ccRebate.toLocaleString() : '—'}</span></div>`;
  html += `<div class="receipt-item"><span class="receipt-label">導購回饋 (${state.referral || 0}%・未稅估算)</span><span class="receipt-value ${r.refRebate ? 'deduct' : 'muted'}">${r.refRebate ? '-NT$' + r.refRebate.toLocaleString() : '—'}</span></div>`;
  if (state.sellGift && state.giftPrice > 0) {
    html += `<div class="receipt-item"><span class="receipt-label">贈品轉售估值</span><span class="receipt-value deduct">-NT$${Number(state.giftPrice).toLocaleString()}</span></div>`;
  }

  html += `<div class="receipt-total">
    <span class="receipt-total-label">實際入手價</span>
    <span class="receipt-total-value">NT$${r.final.toLocaleString()}</span>
  </div>`;

  if (r.totalSaved > 0) {
    html += `<div class="receipt-saved-row"><span>合計省下 NT$${r.totalSaved.toLocaleString()}</span></div>`;
  }

  html += `<div class="receipt-brand">
    <span class="receipt-brand-kicker">Designed by</span>
    <span class="receipt-brand-name">Neil尼歐</span>
    <a class="receipt-brand-link" href="https://neil.tw" target="_blank" rel="noopener">neil.tw</a>
  </div>`;

  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('link-bts-agent').href = BTS_CONFIG.meta.purchaseLinks.btsAgent;
  document.getElementById('modal-overlay').classList.add('open');
}

function receiptGiftRow(name, btsPrice, origPrice) {
  const saving = origPrice - btsPrice;
  const valClass = btsPrice === 0 ? 'free' : '';
  const valText  = btsPrice === 0 ? '免費' : `NT$${btsPrice.toLocaleString()}`;
  const savingTxt = saving > 0 ? ` (省 NT$${saving.toLocaleString()})` : '';
  return `<div class="receipt-item">
    <span class="receipt-label">${name}</span>
    <span class="receipt-value ${valClass}">${valText}${savingTxt}</span>
  </div>`;
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

function generateImage() {
  const r = calcPrice();
  if (!r) { showToast('請先完成所有選擇'); return; }

  showToast('⏳ 正在準備購買清單...');
  const imgUrl = cfg.colorImages?.[state.size]?.[state.color];

  if (!imgUrl) { _drawIpadReceipt(null, r); return; }

  const img = new Image();
  img.crossOrigin = 'anonymous';
  let drawn = false;
  const doDraw = (el) => { if (!drawn) { drawn = true; _drawIpadReceipt(el, r); } };
  img.onload  = () => doDraw(img);
  img.onerror = () => doDraw(null);
  setTimeout(() => doDraw(null), 4000);
  img.src = imgUrl;
}

function _drawIpadReceipt(productImg, r) {
  const sizeCfg    = cfg.sizes[state.size];
  const storageCfg = sizeCfg.storage.find(s => s.id === state.storageId);

  const name  = `iPad ${productType === 'air' ? 'Air' : 'Pro'} ${sizeCfg.label}`;
  const specs = `${storageCfg?.name || ''}${storageCfg?.ram ? ' / ' + storageCfg.ram : ''} · ${state.connectivity === 'wifi' ? 'Wi-Fi' : 'Wi-Fi + 行動網路'}`;
  const colorLine = (state.color || '–') + (productType === 'pro' && state.nano ? ' · 奈米紋理玻璃' : '');

  const sellRow = (state.sellGift && state.giftPrice > 0);
  const rows = [
    { label: '教育商店定價', value: `NT$${r.subtotal.toLocaleString()}` },
    { label: `信用卡回饋 (${state.creditCard || 0}%)`, value: r.ccRebate ? `-NT$${r.ccRebate.toLocaleString()}` : '—', kind: r.ccRebate ? 'deduct' : 'muted' },
    { label: `導購回饋 (${state.referral || 0}%・未稅估算)`, value: r.refRebate ? `-NT$${r.refRebate.toLocaleString()}` : '—', kind: r.refRebate ? 'deduct' : 'muted' }
  ];
  if (sellRow) rows.push({ label: '贈品轉售估值', value: `-NT$${Number(state.giftPrice).toLocaleString()}`, kind: 'deduct' });

  btsDrawReceipt({
    productName: name,
    productImg: productImg,
    specString: specs,
    colorString: colorLine,
    priceRows: rows,
    finalValue: `NT$${r.final.toLocaleString()}`,
    savedText: r.totalSaved > 0 ? `合計省下 NT$${r.totalSaved.toLocaleString()}` : null,
    footerProduct: 'iPad BTS優惠計算機',
    filename: `iPad_BTS購買清單_${new Date().toLocaleDateString('zh-TW').replace(/\//g, '')}.png`
  });
}

// ═══════════════════════════════════════════
//  Navigation
// ═══════════════════════════════════════════
function goBack() {
  if (typeof google !== 'undefined' && google.script) {
    window.top.location.href = '?page=ipad';
  } else {
    window.location.href = 'index.html?page=ipad';
  }
}

// ═══════════════════════════════════════════
//  Toast
// ═══════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ── 啟動 ──
init();
</script>
