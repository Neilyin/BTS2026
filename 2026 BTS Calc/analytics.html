<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTS 數據分析後台</title>
<style>
  :root{
    --brand:#0A66C2; --brand-deep:#084e95; --brand-soft:#eef4fb;
    --ink:#1C1C1E; --text:#1C1C1E; --sub:#6E6E73; --line:rgba(28,28,30,.10);
    --bg:#FAFAFB; --card:#fff; --green:#16935f; --amber:#b25e09;
    --radius:16px; --shadow:0 1px 3px rgba(28,28,30,.06),0 1px 2px rgba(28,28,30,.04);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Outfit',-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;
    background:linear-gradient(180deg,#fff,#FAFAFB 55%,#F3F5F8);color:var(--text);
    min-height:100vh;-webkit-font-smoothing:antialiased;padding:24px}
  .wrap{max-width:1080px;margin:0 auto}
  a{color:var(--brand)}

  /* login */
  .login{max-width:380px;margin:8vh auto;background:var(--card);border:1px solid var(--line);
    border-radius:22px;box-shadow:var(--shadow);padding:34px 28px;text-align:center}
  .login h1{font-size:22px;font-weight:800;margin-bottom:6px}
  .login p{font-size:13px;color:var(--sub);margin-bottom:22px}
  .login input{width:100%;height:46px;border:1px solid var(--line);border-radius:12px;
    padding:0 14px;font-size:15px;margin-bottom:10px;font-family:inherit;background:#fff}
  .login input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(10,102,194,.16)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;height:46px;
    border:none;border-radius:12px;background:var(--brand);color:#fff;font-size:15px;font-weight:700;
    cursor:pointer;font-family:inherit;transition:.18s}
  .btn:hover{background:var(--brand-deep)}
  .btn.ghost{background:#fff;color:var(--text);border:1px solid var(--line);width:auto;height:38px;padding:0 14px;font-size:13px}
  .err{color:#c0392b;font-size:13px;margin-top:10px;min-height:18px}
  .notice{max-width:560px;margin:8vh auto;background:#fff;border:1px solid var(--line);border-radius:18px;
    box-shadow:var(--shadow);padding:28px;color:var(--sub);line-height:1.7;font-size:14px}
  .notice b{color:var(--text)}

  /* dashboard */
  .top{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:22px}
  .top h1{font-size:24px;font-weight:800;margin-right:auto}
  .who{font-size:12px;color:var(--sub)}
  .filters{display:flex;gap:6px}
  .seg{display:inline-flex;background:#eef1f6;border-radius:999px;padding:3px}
  .seg button{border:none;background:transparent;padding:7px 14px;border-radius:999px;font-size:13px;
    font-weight:700;color:var(--sub);cursor:pointer;font-family:inherit}
  .seg button.on{background:#fff;color:var(--brand-deep);box-shadow:var(--shadow)}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
  .kpi .label{font-size:12px;color:var(--sub);font-weight:600}
  .kpi .val{font-size:28px;font-weight:800;margin-top:6px}
  .kpi .val.blue{color:var(--brand)} .kpi .val.green{color:var(--green)}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow)}
  .panel h2{font-size:14px;font-weight:800;margin-bottom:14px}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:13px}
  .bar-row .nm{width:120px;flex:0 0 120px;color:var(--text);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bar-row .track{flex:1;background:#eef1f6;border-radius:999px;height:18px;overflow:hidden}
  .bar-row .fill{height:100%;background:var(--brand);border-radius:999px}
  .bar-row .ct{flex:0 0 auto;color:var(--sub);font-weight:700;font-variant-numeric:tabular-nums}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
  th{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.04em}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .tablewrap{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:6px 8px;box-shadow:var(--shadow);overflow-x:auto}
  .muted{color:var(--sub)}
  .hidden{display:none}
  @media(max-width:760px){.kpis{grid-template-columns:1fr 1fr}.grid2{grid-template-columns:1fr}.top h1{font-size:20px}}
</style>
</head>
<body>
<div class="wrap">

  <!-- 未設定提示 -->
  <div id="view-notice" class="notice hidden">
    <b>分析尚未啟用</b><br>
    請先在 <code>bts-analytics-config.js</code> 填入 Firebase 設定（並啟用 Firestore + Authentication）。
    填好重新部署後即可登入查看數據。
  </div>

  <!-- 登入 -->
  <div id="view-login" class="login hidden">
    <h1>BTS 數據分析</h1>
    <p>請以管理員帳號登入</p>
    <input id="email" type="email" placeholder="email" autocomplete="username">
    <input id="pass" type="password" placeholder="密碼" autocomplete="current-password">
    <button class="btn" id="loginBtn">登入</button>
    <div class="err" id="loginErr"></div>
  </div>

  <!-- 儀表板 -->
  <div id="view-dash" class="hidden">
    <div class="top">
      <h1>📊 BTS 數據分析</h1>
      <span class="who" id="who"></span>
      <div class="filters">
        <div class="seg" id="seg">
          <button data-r="today">今日</button>
          <button data-r="7">近 7 天</button>
          <button data-r="30" class="on">近 30 天</button>
          <button data-r="all">全部</button>
        </div>
        <button class="btn ghost" id="refreshBtn">重新整理</button>
        <button class="btn ghost" id="logoutBtn">登出</button>
      </div>
    </div>

    <div class="kpis">
      <div class="kpi"><div class="label">總筆數（區間）</div><div class="val" id="k-total">–</div></div>
      <div class="kpi"><div class="label">不重複 session</div><div class="val" id="k-sessions">–</div></div>
      <div class="kpi"><div class="label">平均實際入手價</div><div class="val blue" id="k-avg">–</div></div>
      <div class="kpi"><div class="label">平均省下</div><div class="val green" id="k-saved">–</div></div>
    </div>

    <div class="grid2">
      <div class="panel"><h2>產品分布</h2><div id="byProduct"></div></div>
      <div class="panel"><h2>熱門推薦組合</h2><div id="byRecommendation"></div></div>
    </div>
    <div class="grid2">
      <div class="panel"><h2>熱門容量 / 儲存</h2><div id="byStorage"></div></div>
      <div class="panel"><h2>熱門顏色</h2><div id="byColor"></div></div>
    </div>

    <div class="panel" style="margin-bottom:14px"><h2>全部紀錄（<span id="recordCount">0</span> 筆）</h2>
      <div class="tablewrap">
        <table><thead><tr>
          <th>時間</th><th>產品</th><th>使用者選擇</th><th>最後推薦</th><th>顏色</th>
          <th class="num">定價</th><th class="num">回饋</th><th class="num">實際入手</th><th class="num">省下</th>
        </tr></thead><tbody id="recentBody"></tbody></table>
      </div>
    </div>
    <p class="muted" style="font-size:12px;text-align:center;margin-top:6px">資料全程匿名（隨機 session id，不含個資）· Designed by Neil尼歐</p>
  </div>

</div>

<script src="bts-analytics-config.js"></script>
<script src="bts-analytics.js"></script>
<script>
(function(){
  var COLL = (window.BTS_ANALYTICS_CONFIG||{}).recordsCollection || 'records';
  var $ = function(id){ return document.getElementById(id); };
  function show(v){ ['view-notice','view-login','view-dash'].forEach(function(x){ $(x).classList.toggle('hidden', x!==v); }); }

  if (!window.btsAnalytics || !btsAnalytics.enabled) { show('view-notice'); return; }

  var ALL = [];          // 已抓取的紀錄
  var range = '30';

  btsAnalytics.onReady(function(){
    var auth = btsAnalytics.auth;
    auth.onAuthStateChanged(function(user){
      if (user){ $('who').textContent = user.email; show('view-dash'); load(); }
      else { show('view-login'); }
    });

    $('loginBtn').onclick = function(){
      $('loginErr').textContent = '';
      auth.signInWithEmailAndPassword($('email').value.trim(), $('pass').value)
        .catch(function(e){ $('loginErr').textContent = '登入失敗：' + (e.code || e.message); });
    };
    $('pass').addEventListener('keydown', function(e){ if(e.key==='Enter') $('loginBtn').click(); });
    $('logoutBtn').onclick = function(){ auth.signOut(); };
    $('refreshBtn').onclick = load;
    $('seg').addEventListener('click', function(e){
      var b = e.target.closest('button'); if(!b) return;
      [].forEach.call($('seg').children, function(x){ x.classList.toggle('on', x===b); });
      range = b.dataset.r; render();
    });
  });

  var loadVersion = 0;
  function load(){
    var version = ++loadVersion;
    ALL = [];
    $('recordCount').textContent = '讀取中';

    function loadPage(cursor){
      var q = btsAnalytics.db.collection(COLL).orderBy('createdAt','desc').limit(500);
      if (cursor) q = q.startAfter(cursor);
      return q.get().then(function(snap){
        if (version !== loadVersion) return;
        snap.forEach(function(d){ ALL.push(d.data()); });
        $('recordCount').textContent = ALL.length.toLocaleString();
        if (snap.size === 500) return loadPage(snap.docs[snap.docs.length - 1]);
      });
    }

    loadPage(null)
      .then(function(){ if (version === loadVersion) render(); })
      .catch(function(e){ alert('讀取失敗：' + (e.code||e.message) + '\n（請確認已登入、且 Firestore 規則允許管理員讀取）'); });
  }

  function inRange(r){
    if (range==='all') return true;
    var t = r.createdAt || 0, now = Date.now();
    if (range==='today'){ var d=new Date(); d.setHours(0,0,0,0); return t>=d.getTime(); }
    return t >= now - Number(range)*86400000;
  }
  function plabel(r){
    if (r.productLine==='ipad') return 'iPad ' + (r.product==='pro'?'Pro':'Air');
    if (r.productLine==='mac'){
      var labels = {
        air: 'MacBook Air',
        pro: 'MacBook Pro',
        neo: 'MacBook Neo',
        imac: 'iMac',
        macmini: 'Mac mini'
      };
      return labels[r.product] || r.model || 'Mac';
    }
    return r.model || '其他';
  }
  function bars(el, counts){
    var entries = Object.keys(counts).map(function(k){return [k,counts[k]];}).sort(function(a,b){return b[1]-a[1];}).slice(0,8);
    var max = entries.length ? entries[0][1] : 1;
    el.innerHTML = entries.length ? entries.map(function(e){
      return '<div class="bar-row"><span class="nm" title="'+esc(e[0])+'">'+esc(e[0])+'</span>'+
             '<span class="track"><span class="fill" style="width:'+Math.max(4,Math.round(e[1]/max*100))+'%"></span></span>'+
             '<span class="ct">'+e[1]+'</span></div>';
    }).join('') : '<p class="muted" style="font-size:13px">尚無資料</p>';
  }
  function tally(rows, fn){ var c={}; rows.forEach(function(r){ var k=fn(r); if(k){ c[k]=(c[k]||0)+1; } }); return c; }
  function ntd(n){ return 'NT$' + Math.round(n||0).toLocaleString(); }
  function esc(v){
    return String(v == null ? '' : v).replace(/[&<>"']/g, function(ch){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];
    });
  }

  function render(){
    var rows = ALL.filter(inRange);
    $('recordCount').textContent = rows.length.toLocaleString();
    $('k-total').textContent = rows.length.toLocaleString();
    $('k-sessions').textContent = Object.keys(tally(rows, function(r){return r.sessionId;})).length.toLocaleString();
    var fins = rows.map(function(r){return r.final||0;}).filter(function(n){return n>0;});
    var savs = rows.map(function(r){return r.totalSaved||0;});
    $('k-avg').textContent = fins.length ? ntd(fins.reduce(function(a,b){return a+b;},0)/fins.length) : '–';
    $('k-saved').textContent = rows.length ? ntd(savs.reduce(function(a,b){return a+b;},0)/rows.length) : '–';

    bars($('byProduct'), tally(rows, plabel));
    bars($('byRecommendation'), tally(rows, function(r){return r.recommendation || r.model;}));
    bars($('byStorage'), tally(rows, function(r){return r.storage;}));
    bars($('byColor'),   tally(rows, function(r){return r.color;}));

    var recent = rows.map(function(r){
      var s = r.selections || {};
      var specs = [
        s.size,
        s.chip || r.chip,
        s.memory || r.memory,
        s.storage || r.storage,
        s.ram || r.ram,
        s.connectivity || r.connectivity,
        s.displayGlass,
        s.powerId ? '電源：' + s.powerId : null,
        s.ethernetId ? '網路：' + s.ethernetId : null,
        s.gift && s.gift.name ? '贈品：' + s.gift.name : null
      ].filter(Boolean).join(' · ');
      var t = r.createdAt ? new Date(r.createdAt).toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '–';
      var reb = (r.ccRebate||0)+(r.refRebate||0);
      return '<tr><td class="muted">'+esc(t)+'</td><td>'+esc(plabel(r))+'</td><td class="muted">'+esc(specs||'–')+
        '</td><td><b>'+esc(r.recommendation||r.model||'–')+'</b></td><td>'+esc(r.color||'–')+'</td><td class="num">'+ntd(r.subtotal)+'</td><td class="num">'+(reb?'-'+ntd(reb):'–')+
        '</td><td class="num"><b>'+ntd(r.final)+'</b></td><td class="num">'+(r.totalSaved?ntd(r.totalSaved):'–')+'</td></tr>';
    }).join('');
    $('recentBody').innerHTML = recent || '<tr><td colspan="9" class="muted" style="text-align:center;padding:20px">此區間尚無紀錄</td></tr>';
  }
})();
</script>
</body>
</html>
